<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPERLANCE // Synthwave Combat</title>
<style>
  :root{
    --cyan:#21f3ff;
    --mag:#ff2bd6;
    --violet:#9b6bff;
    --amber:#ffb020;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#05030d;overflow:hidden;
    font-family:'Segoe UI',Tahoma,system-ui,sans-serif;cursor:crosshair;color:#eaf6ff}
  canvas{display:block;position:absolute;inset:0}
  .ui{position:fixed;pointer-events:none;user-select:none;z-index:10}

  /* HUD */
  #hud{inset:0}
  .hud-top{position:absolute;top:18px;left:24px;right:24px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
  .stat-label{font-size:.65rem;letter-spacing:3px;color:#6f7fb0;text-transform:uppercase}
  .score{font-size:2.6rem;font-weight:800;line-height:1;color:#fff;
    text-shadow:0 0 18px var(--cyan),0 0 36px rgba(33,243,255,.5);font-variant-numeric:tabular-nums}
  .multi{font-size:.95rem;font-weight:700;color:var(--amber);letter-spacing:1px;
    text-shadow:0 0 14px rgba(255,176,32,.7);opacity:0;transition:opacity .25s}
  .multi.on{opacity:1}
  .right-col{text-align:right;min-width:260px}
  .bar-wrap{margin-top:6px}
  .bar{height:13px;border-radius:8px;overflow:hidden;position:relative;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .bar i{position:absolute;inset:0;transform-origin:left;transition:transform .18s ease}
  .hp i{background:linear-gradient(90deg,#ff2bd6,#ff6b9d);box-shadow:0 0 14px rgba(255,43,214,.7)}
  .shield i{background:linear-gradient(90deg,#21f3ff,#7df9ff);box-shadow:0 0 14px rgba(33,243,255,.7)}
  .heat i{background:linear-gradient(90deg,#ffb020,#ff5a3c);box-shadow:0 0 14px rgba(255,90,60,.7)}
  .wave-tag{font-size:.7rem;letter-spacing:3px;color:#8fa0d8;margin-top:10px}

  /* center banners */
  .banner{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
    text-align:center;font-weight:900;letter-spacing:6px;
    text-shadow:0 0 30px currentColor;opacity:0;transition:opacity .4s}
  .banner.show{opacity:1}
  .wave-banner{font-size:4.6rem;color:var(--cyan)}
  .wave-sub{font-size:1rem;letter-spacing:8px;color:var(--mag);margin-top:6px}

  /* overlays */
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;z-index:50;
    background:radial-gradient(ellipse at 50% 40%,rgba(20,8,40,.72),rgba(3,2,10,.94));
    backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}
  .overlay.hidden{display:none}
  .logo{font-size:clamp(3rem,11vw,7.5rem);font-weight:900;letter-spacing:.04em;line-height:.9;
    background:linear-gradient(135deg,var(--cyan),var(--violet),var(--mag),var(--cyan));
    background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    filter:drop-shadow(0 0 26px rgba(155,107,255,.55));
    animation:flow 7s linear infinite}
  @keyframes flow{to{background-position:300% 0}}
  .tag{margin-top:8px;font-size:.95rem;letter-spacing:7px;color:#7f8cc0}
  .play{margin-top:42px;padding:16px 58px;font:700 1.15rem/1 'Segoe UI',sans-serif;
    letter-spacing:4px;color:#03121a;cursor:pointer;border:none;border-radius:10px;
    background:linear-gradient(135deg,var(--cyan),#7df9ff);
    box-shadow:0 0 28px rgba(33,243,255,.55),inset 0 0 18px rgba(255,255,255,.4);
    transition:transform .18s,box-shadow .18s;pointer-events:auto}
  .play:hover{transform:translateY(-3px) scale(1.03);
    box-shadow:0 0 46px rgba(33,243,255,.85),inset 0 0 22px rgba(255,255,255,.6)}
  .play:active{transform:translateY(0) scale(.99)}
  .play.mag{background:linear-gradient(135deg,var(--mag),#ff7fc6);
    box-shadow:0 0 28px rgba(255,43,214,.55),inset 0 0 18px rgba(255,255,255,.4)}
  .play.mag:hover{box-shadow:0 0 46px rgba(255,43,214,.85),inset 0 0 22px rgba(255,255,255,.6)}
  .keys{margin-top:34px;font-size:.82rem;line-height:2;color:#65719f;max-width:560px}
  .keys b{color:var(--cyan);font-weight:700;letter-spacing:1px}
  .go-title{font-size:clamp(2.4rem,8vw,5rem);font-weight:900;letter-spacing:.06em;
    color:var(--mag);text-shadow:0 0 34px rgba(255,43,214,.6)}
  .go-score{font-size:3.4rem;font-weight:800;color:#fff;margin-top:14px;
    text-shadow:0 0 20px var(--cyan)}
  .go-best{margin-top:6px;color:#8fa0d8;letter-spacing:2px;font-size:1rem}
  .go-best.new{color:var(--amber);text-shadow:0 0 16px rgba(255,176,32,.7)}
  .go-stats{margin-top:10px;color:#5e6a96;font-size:.85rem;letter-spacing:1px}
  .hint-blink{margin-top:24px;font-size:.78rem;letter-spacing:3px;color:#4a5680;
    animation:blink 1.4s steps(2) infinite}
  @keyframes blink{50%{opacity:.25}}
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- HUD -->
  <div class="ui" id="hud" style="display:none">
    <div class="hud-top">
      <div>
        <div class="stat-label">Score</div>
        <div class="score" id="score">0</div>
        <div class="multi" id="multi">x1.0 CHAIN</div>
      </div>
      <div class="right-col">
        <div class="stat-label">Hull</div>
        <div class="bar-wrap"><div class="bar hp"><i id="hpFill"></i></div></div>
        <div class="stat-label" style="margin-top:8px">Shield</div>
        <div class="bar-wrap"><div class="bar shield"><i id="shFill"></i></div></div>
        <div class="stat-label" style="margin-top:8px">Heat</div>
        <div class="bar-wrap"><div class="bar heat"><i id="heatFill"></i></div></div>
        <div class="wave-tag" id="waveTag">WAVE 1</div>
      </div>
    </div>
    <div class="banner" id="waveBanner">
      <div class="wave-banner" id="waveBigNum">WAVE 1</div>
      <div class="wave-sub" id="waveBigSub">INCOMING</div>
    </div>
  </div>

  <!-- Start -->
  <div class="overlay" id="startScreen">
    <div class="logo">HYPERLANCE</div>
    <div class="tag">SYNTHWAVE&nbsp;&nbsp;COMBAT&nbsp;&nbsp;ARENA</div>
    <button class="play" id="startBtn">ENGAGE</button>
    <div class="keys">
      <b>WASD</b> / <b>ARROWS</b> thrust &nbsp;·&nbsp; <b>MOUSE</b> aim<br>
      <b>HOLD LMB</b> blaster &nbsp;·&nbsp; <b>RELEASE charged shot</b> &nbsp;·&nbsp; <b>RMB / SPACE</b> pulse blast<br>
      <b>SHIFT</b> overdrive boost &nbsp;·&nbsp; mind your <b>HEAT</b>
    </div>
  </div>

  <!-- Game over -->
  <div class="overlay hidden" id="overScreen">
    <div class="go-title">SHIP DESTROYED</div>
    <div class="go-score" id="overScore">0</div>
    <div class="go-best" id="overBest">BEST 0</div>
    <div class="go-stats" id="overStats"></div>
    <button class="play mag" id="restartBtn">RE-ENGAGE</button>
    <div class="hint-blink">PRESS ENTER</div>
  </div>

<script>
"use strict";
(function(){
/* ====================== setup ====================== */
const cv = document.getElementById('scene');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
addEventListener('resize', resize);

/* ====================== helpers ====================== */
const TAU = Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>Math.floor(rand(a,b+1));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
const angTo=(ax,ay,bx,by)=>Math.atan2(by-ay,bx-ax);
const angLerp=(a,b,t)=>{let d=((b-a+Math.PI)%TAU)-Math.PI;return a+d*t;};

/* ====================== input ====================== */
const keys=Object.create(null);
const mouse={x:W/2,y:H/2,down:false,right:false,clickedReleaseTime:0};
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(k===' '||k==='arrowup'||k==='arrowdown'||k==='arrowleft'||k==='arrowright') e.preventDefault();
  if(k==='enter'){ if(state==='menu') startGame(); else if(state==='over') startGame(); }
});
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
addEventListener('mousemove',e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
addEventListener('mousedown',e=>{
  if(e.button===0){ mouse.down=true; charge.active=true; charge.t=0; }
  if(e.button===2){ mouse.right=true; firePulse(); }
});
addEventListener('mouseup',e=>{
  if(e.button===0){ mouse.down=false; releaseCharge(); }
  if(e.button===2){ mouse.right=false; }
});
addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('blur',()=>{ for(const k in keys) keys[k]=false; mouse.down=false; charge.active=false; });

/* ====================== game state ====================== */
let state='menu'; // menu | playing | over
let score=0;
let best = parseInt(localStorage.getItem('hyperlance_best')||'0',10)||0;
let shake=0, hitFlash=0, slowmo=0;
let wave=0, killsThisWave=0, waveQuota=0, betweenWaves=0, totalKills=0;
let chain=1, chainTimer=0;
let frame=0;

/* ====================== starfield / background ====================== */
const STAR_LAYERS=3;
let stars=[];
function buildStars(){
  stars=[];
  for(let l=0;l<STAR_LAYERS;l++){
    const depth=(l+1)/STAR_LAYERS;
    const n=Math.floor((W*H)/(14000/(l+1)));
    for(let i=0;i<n;i++){
      stars.push({x:rand(0,W),y:rand(0,H),z:depth,
        r:rand(.4,1.6)*depth,tw:rand(0,TAU),
        c:[ '#bfe9ff','#ffd0f4','#d8c8ff' ][l%3]});
    }
  }
}
buildStars();
addEventListener('resize',buildStars);

// drifting nebula blobs
const neb=[];
for(let i=0;i<5;i++){
  neb.push({x:rand(0,1),y:rand(0,1),r:rand(.3,.6),
    vx:rand(-.00004,.00004),vy:rand(-.00004,.00004),
    c:['#ff2bd6','#21f3ff','#9b6bff','#5a2bff','#ff6b9d'][i]});
}

/* ====================== object pools ====================== */
const particles=[];   // {x,y,vx,vy,life,max,size,col,glow,grav,drag,shape,rot,vr}
const bullets=[];      // player bullets
const ebullets=[];     // enemy bullets
const enemies=[];
const shockwaves=[];   // {x,y,r,max,life,col,w}
const drops=[];        // pickups
const texts=[];        // floating score text

function spark(x,y,col,opts){
  opts=opts||{};
  const count=opts.count||1;
  const sp=opts.speed||3;
  for(let i=0;i<count;i++){
    const a=opts.dir!=null? opts.dir+rand(-(opts.spread||TAU)/2,(opts.spread||TAU)/2) : rand(0,TAU);
    const s=rand(sp*0.25,sp);
    particles.push({
      x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:opts.life||rand(20,46),max:opts.life||40,
      size:opts.size||rand(1.4,3.2),col:col,glow:opts.glow!==false,
      grav:opts.grav||0,drag:opts.drag||0.92,
      shape:opts.shape||'dot',rot:rand(0,TAU),vr:rand(-.3,.3)
    });
  }
}
function burst(x,y,cols,n,power){
  for(let i=0;i<n;i++){
    const c=cols[i%cols.length];
    spark(x,y,c,{count:1,speed:power,life:rand(26,60),size:rand(1.5,4),drag:rand(.9,.96)});
  }
  shockwaves.push({x,y,r:4,max:power*14,life:1,col:cols[0],w:rand(2,3.5)});
}

/* ====================== player ====================== */
const player={
  x:W/2,y:H/2,vx:0,vy:0,ang:-Math.PI/2,
  hp:100,maxHp:100,shield:60,maxShield:60,shRegenDelay:0,
  heat:0,maxHeat:100,overheat:false,
  thrust:.55,fireCd:0,invuln:0,boost:false,
  trail:[]
};
const charge={active:false,t:0};

function resetPlayer(){
  player.x=W/2; player.y=H/2; player.vx=0; player.vy=0; player.ang=-Math.PI/2;
  player.hp=100; player.shield=60; player.heat=0; player.overheat=false;
  player.fireCd=0; player.invuln=90; player.trail.length=0;
}

/* ====================== weapons ====================== */
function fireBlaster(){
  if(player.overheat) return;
  if(player.fireCd>0) return;
  const a=player.ang;
  const muzzle=18;
  const mx=player.x+Math.cos(a)*muzzle;
  const my=player.y+Math.sin(a)*muzzle;
  // spread scales gently with chain
  const lanes = chain>=6?3:chain>=3?2:1;
  for(let i=0;i<lanes;i++){
    const off=(i-(lanes-1)/2)*0.09;
    bullets.push({x:mx,y:my,vx:Math.cos(a+off)*14,vy:Math.sin(a+off)*14,
      dmg:14,life:64,r:3,charged:false,trail:[]});
  }
  player.fireCd=6;
  player.heat=clamp(player.heat+5.5,0,player.maxHeat);
  if(player.heat>=player.maxHeat){ player.overheat=true; shake=Math.max(shake,4);
    spark(mx,my,'#ff5a3c',{count:14,speed:4,life:30}); }
  // recoil knockback
  player.vx-=Math.cos(a)*0.5; player.vy-=Math.sin(a)*0.5;
  spark(mx,my,'#21f3ff',{count:3,speed:3,dir:a,spread:0.6,life:14,size:2});
}
function releaseCharge(){
  if(!charge.active) return;
  const power=clamp(charge.t/55,0,1);
  charge.active=false;
  if(power<0.35 || player.overheat){ return; } // weak release does nothing special
  const a=player.ang;
  const mx=player.x+Math.cos(a)*20, my=player.y+Math.sin(a)*20;
  const dmg=30+power*70;
  bullets.push({x:mx,y:my,vx:Math.cos(a)*16,vy:Math.sin(a)*16,
    dmg:dmg,life:80,r:6+power*8,charged:true,power:power,trail:[]});
  player.heat=clamp(player.heat+18*power,0,player.maxHeat);
  if(player.heat>=player.maxHeat) player.overheat=true;
  // big recoil
  player.vx-=Math.cos(a)*(3+power*4); player.vy-=Math.sin(a)*(3+power*4);
  shake=Math.max(shake,5+power*7);
  shockwaves.push({x:mx,y:my,r:6,max:40+power*60,life:1,col:'#9b6bff',w:3});
  spark(mx,my,'#9b6bff',{count:16,speed:5,dir:a+Math.PI,spread:1.2,life:30});
}
let pulseCd=0;
function firePulse(){
  if(state!=='playing'||pulseCd>0) return;
  pulseCd=210;
  const R=240;
  shockwaves.push({x:player.x,y:player.y,r:10,max:R,life:1,col:'#21f3ff',w:5});
  shockwaves.push({x:player.x,y:player.y,r:10,max:R*0.7,life:1,col:'#ff2bd6',w:3});
  shake=Math.max(shake,9);
  hitFlash=Math.max(hitFlash,0.25);
  spark(player.x,player.y,'#7df9ff',{count:40,speed:7,life:40,size:3});
  // damage + knockback all enemies & clear nearby bullets
  for(const e of enemies){
    const d2=dist2(player.x,player.y,e.x,e.y);
    if(d2<R*R){
      const d=Math.sqrt(d2)||1;
      const a=angTo(player.x,player.y,e.x,e.y);
      const k=(1-d/R);
      e.vx+=Math.cos(a)*9*k; e.vy+=Math.sin(a)*9*k;
      damageEnemy(e,40*k,e.x,e.y,'#21f3ff');
    }
  }
  for(let i=ebullets.length-1;i>=0;i--){
    if(dist2(player.x,player.y,ebullets[i].x,ebullets[i].y)<R*R){
      spark(ebullets[i].x,ebullets[i].y,'#21f3ff',{count:3,speed:2});
      ebullets.splice(i,1);
    }
  }
}

/* ====================== enemies ====================== */
// types: swarmer, weaver, turret, splitter, mini (from splitter), boss
function makeEnemy(type,x,y,extra){
  const base={x,y,vx:0,vy:0,ang:rand(0,TAU),type,dead:false,cd:rand(40,110),
    phase:rand(0,TAU),hitTimer:0};
  switch(type){
    case 'swarmer': Object.assign(base,{hp:24,maxHp:24,r:13,spd:3.0,pts:120,col:'#ff5a6e'}); break;
    case 'weaver':  Object.assign(base,{hp:40,maxHp:40,r:16,spd:2.4,pts:240,col:'#ffb020'}); break;
    case 'turret':  Object.assign(base,{hp:70,maxHp:70,r:22,spd:1.1,pts:380,col:'#ff2bd6'}); break;
    case 'splitter':Object.assign(base,{hp:90,maxHp:90,r:26,spd:1.3,pts:500,col:'#9b6bff'}); break;
    case 'mini':    Object.assign(base,{hp:14,maxHp:14,r:9,spd:3.6,pts:60,col:'#c79bff'}); break;
    case 'boss':    Object.assign(base,{hp:1400+wave*120,maxHp:1400+wave*120,r:60,spd:1.0,pts:6000,col:'#ff2bd6',ringAng:0}); break;
  }
  if(extra) Object.assign(base,extra);
  return base;
}
function spawnEdge(){
  const m=80;
  const side=randi(0,3);
  if(side===0) return {x:rand(-m,W+m),y:-m};
  if(side===1) return {x:W+m,y:rand(-m,H+m)};
  if(side===2) return {x:rand(-m,W+m),y:H+m};
  return {x:-m,y:rand(-m,H+m)};
}

function startWave(){
  wave++;
  killsThisWave=0;
  const isBoss = wave%5===0;
  document.getElementById('waveTag').textContent='WAVE '+wave + (isBoss?' // BOSS':'');
  showWaveBanner(isBoss);
  if(isBoss){
    const p=spawnEdge();
    enemies.push(makeEnemy('boss',p.x,p.y));
    waveQuota=1;
    return;
  }
  const n = 4 + Math.floor(wave*1.6);
  waveQuota=n;
  let pool=['swarmer','swarmer','weaver'];
  if(wave>=2) pool.push('turret');
  if(wave>=3) pool.push('splitter','weaver');
  if(wave>=6) pool.push('turret','splitter');
  let spawned=0;
  const iv=setInterval(()=>{
    if(state!=='playing'){ clearInterval(iv); return; }
    if(spawned>=n){ clearInterval(iv); return; }
    const batch=Math.min(randi(1,3),n-spawned);
    for(let i=0;i<batch;i++){
      const p=spawnEdge();
      const t=pool[randi(0,pool.length-1)];
      enemies.push(makeEnemy(t,p.x,p.y));
      spark(p.x,p.y,'#9b6bff',{count:6,speed:3});
    }
    spawned+=batch;
  }, Math.max(260, 760 - wave*40));
}

function updateEnemy(e){
  if(e.hitTimer>0) e.hitTimer--;
  const toP=angTo(e.x,e.y,player.x,player.y);
  const d=Math.hypot(player.x-e.x,player.y-e.y);
  e.phase+=0.05;
  switch(e.type){
    case 'swarmer':{
      e.vx+=Math.cos(toP)*0.16; e.vy+=Math.sin(toP)*0.16;
      e.ang=angLerp(e.ang,toP,0.2);
      break;
    }
    case 'mini':{
      e.vx+=Math.cos(toP)*0.22; e.vy+=Math.sin(toP)*0.22;
      e.ang=angLerp(e.ang,toP,0.25);
      break;
    }
    case 'weaver':{
      const perp=toP+Math.PI/2;
      const w=Math.sin(e.phase*1.4)*0.5;
      e.vx+=Math.cos(toP)*0.10 + Math.cos(perp)*w*0.5;
      e.vy+=Math.sin(toP)*0.10 + Math.sin(perp)*w*0.5;
      e.ang=Math.atan2(e.vy,e.vx);
      if(e.cd--<=0 && d<560){
        const a=angTo(e.x,e.y,player.x,player.y);
        ebullets.push(eb(e.x,e.y,a,4.8,10,'#ffd76b'));
        e.cd=randi(60,100);
      }
      break;
    }
    case 'turret':{
      // keep distance, strafe, burst fire
      const ideal=300;
      const radial = d>ideal? 0.06 : -0.05;
      e.vx+=Math.cos(toP)*radial + Math.cos(toP+Math.PI/2)*0.04*Math.sin(e.phase);
      e.vy+=Math.sin(toP)*radial + Math.sin(toP+Math.PI/2)*0.04*Math.sin(e.phase);
      e.ang=angLerp(e.ang,toP,0.1);
      if(e.cd--<=0 && d<640){
        const a=angTo(e.x,e.y,player.x,player.y);
        for(let i=-2;i<=2;i++) ebullets.push(eb(e.x,e.y,a+i*0.16,5,12,'#ff7fc6'));
        e.cd=130;
        spark(e.x+Math.cos(a)*20,e.y+Math.sin(a)*20,'#ff2bd6',{count:5,speed:3,dir:a,spread:0.8});
      }
      break;
    }
    case 'splitter':{
      e.vx+=Math.cos(toP)*0.07; e.vy+=Math.sin(toP)*0.07;
      e.ang+=0.04;
      if(e.cd--<=0 && d<600){
        const a=angTo(e.x,e.y,player.x,player.y);
        for(let i=0;i<6;i++) ebullets.push(eb(e.x,e.y,a+i*TAU/6+e.phase,3.6,9,'#c79bff'));
        e.cd=150;
      }
      break;
    }
    case 'boss':{
      e.ringAng+=0.012;
      const ideal=Math.min(W,H)*0.32;
      const radial = d>ideal?0.05:-0.04;
      e.vx+=Math.cos(toP)*radial + Math.cos(e.phase)*0.05;
      e.vy+=Math.sin(toP)*radial + Math.sin(e.phase*1.1)*0.05;
      e.ang=angLerp(e.ang,toP,0.04);
      if(e.cd--<=0){
        const a=angTo(e.x,e.y,player.x,player.y);
        const pat = Math.floor(frame/180)%3;
        if(pat===0){ for(let i=-3;i<=3;i++) ebullets.push(eb(e.x,e.y,a+i*0.12,5.5,14,'#ff7fc6')); e.cd=40; }
        else if(pat===1){ for(let i=0;i<12;i++) ebullets.push(eb(e.x,e.y,e.ringAng+i*TAU/12,3.8,12,'#c79bff')); e.cd=24; }
        else { ebullets.push(eb(e.x,e.y,a,7,18,'#ffd76b')); e.cd=14; }
      }
      break;
    }
  }
  // physics
  const fr = e.type==='boss'?0.96:0.93;
  e.vx*=fr; e.vy*=fr;
  const sp=Math.hypot(e.vx,e.vy);
  if(sp>e.spd){ e.vx=e.vx/sp*e.spd; e.vy=e.vy/sp*e.spd; }
  e.x+=e.vx; e.y+=e.vy;
}
function eb(x,y,a,sp,dmg,col){
  return {x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,dmg,r:5,life:200,col};
}

function damageEnemy(e,dmg,hx,hy,col){
  if(e.dead) return;
  e.hp-=dmg; e.hitTimer=5;
  spark(hx,hy,col||e.col,{count:4,speed:2.4,life:18,size:2});
  if(e.hp<=0){ killEnemy(e); }
}
function killEnemy(e){
  if(e.dead) return;
  e.dead=true;
  killsThisWave++; totalKills++;
  chain=Math.min(chain+1,99); chainTimer=150;
  const mult=1+Math.floor(chain/2)*0.1;
  const gained=Math.round(e.pts*mult);
  score+=gained;
  texts.push({x:e.x,y:e.y,vy:-0.7,life:50,max:50,txt:'+'+gained,col:'#ffd76b'});
  // explosion
  const cols=[e.col,'#ffffff','#ffd76b'];
  burst(e.x,e.y,cols, e.type==='boss'?120:e.type==='splitter'?40:24, e.type==='boss'?10:e.r>20?6:4.5);
  shake=Math.max(shake, e.type==='boss'?22:e.r>20?9:5);
  if(e.type==='boss'){ hitFlash=Math.max(hitFlash,0.5); slowmo=Math.max(slowmo,40); }
  if(e.type==='splitter'){
    for(let i=0;i<3;i++){
      const a=rand(0,TAU);
      const m=makeEnemy('mini',e.x,e.y);
      m.vx=Math.cos(a)*3; m.vy=Math.sin(a)*3;
      enemies.push(m);
    }
    waveQuota+=3; // minis must die too
  }
  // chance for pickup
  if(Math.random()< (e.type==='boss'?1: e.r>20?0.28:0.12)){
    spawnDrop(e.x,e.y, e.type==='boss'?'shield':(Math.random()<0.5?'hp':'shield'));
  }
}

/* ====================== drops ====================== */
function spawnDrop(x,y,kind){
  drops.push({x,y,vx:rand(-1,1),vy:rand(-1,1),kind,life:560,phase:rand(0,TAU)});
}

/* ====================== collision ====================== */
function bulletHits(){
  // player bullets vs enemies
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    let consumed=false;
    for(const e of enemies){
      if(e.dead) continue;
      const rr=(e.r+b.r);
      if(dist2(b.x,b.y,e.x,e.y)<rr*rr){
        damageEnemy(e,b.dmg,b.x,b.y,'#ffffff');
        if(b.charged){
          // pierce + splash
          shockwaves.push({x:b.x,y:b.y,r:6,max:60+ (b.power||0.5)*70,life:1,col:'#9b6bff',w:3});
          for(const e2 of enemies){
            if(e2!==e && !e2.dead){
              const sr=80+(b.power||0.5)*70;
              if(dist2(b.x,b.y,e2.x,e2.y)<sr*sr) damageEnemy(e2,b.dmg*0.5,e2.x,e2.y,'#9b6bff');
            }
          }
          shake=Math.max(shake,7);
          consumed=true; // charged disappears after big hit
        }else{
          consumed=true;
        }
        if(consumed) break;
      }
    }
    if(consumed||b.life<=0){ bullets.splice(i,1); }
  }
}

/* ====================== main update ====================== */
function update(dt){
  frame++;
  if(state!=='playing'){ updateMenuBg(); return; }

  // ---- player input / movement ----
  let ix=0,iy=0;
  if(keys['w']||keys['arrowup']) iy-=1;
  if(keys['s']||keys['arrowdown']) iy+=1;
  if(keys['a']||keys['arrowleft']) ix-=1;
  if(keys['d']||keys['arrowright']) ix+=1;
  player.boost = (keys['shift']) && !(ix===0&&iy===0);
  const th = player.boost? player.thrust*2.1 : player.thrust;
  if(ix||iy){
    const l=Math.hypot(ix,iy); ix/=l; iy/=l;
    player.vx+=ix*th; player.vy+=iy*th;
    if(player.boost){
      // engine particles opposite movement
      const a=Math.atan2(-iy,-ix);
      spark(player.x+Math.cos(a)*14,player.y+Math.sin(a)*14,'#ffb020',
        {count:2,speed:3.2,dir:a,spread:0.7,life:18,size:3});
    }
  }
  player.vx*=0.94; player.vy*=0.94;
  player.x+=player.vx; player.y+=player.vy;
  // soft bounds with bounce
  const pad=24;
  if(player.x<pad){player.x=pad;player.vx*=-0.5;}
  if(player.x>W-pad){player.x=W-pad;player.vx*=-0.5;}
  if(player.y<pad){player.y=pad;player.vy*=-0.5;}
  if(player.y>H-pad){player.y=H-pad;player.vy*=-0.5;}
  // aim
  player.ang = angTo(player.x,player.y,mouse.x,mouse.y);
  // trail
  player.trail.push({x:player.x,y:player.y});
  if(player.trail.length>16) player.trail.shift();

  // ---- firing ----
  if(player.fireCd>0) player.fireCd--;
  if(mouse.down && !charge.active){} // safety
  if(charge.active){
    charge.t++;
    // tap-fire while not fully charging: rapid blaster until charge builds
    if(charge.t<6) fireBlaster();
    else if(charge.t%6===0 && charge.t<24) fireBlaster();
    // visual charge orb particles
    if(charge.t>20 && frame%2===0){
      const a=rand(0,TAU), rr=rand(10,26);
      particles.push({x:player.x+Math.cos(player.ang)*18+Math.cos(a)*rr,
        y:player.y+Math.sin(player.ang)*18+Math.sin(a)*rr,
        vx:-Math.cos(a)*1.4,vy:-Math.sin(a)*1.4,life:14,max:14,size:2.2,
        col:'#9b6bff',glow:true,drag:0.9,grav:0,shape:'dot',rot:0,vr:0});
    }
  }
  if(player.overheat){
    player.heat-=0.9;
    if(player.heat<=0){ player.heat=0; player.overheat=false; }
  }else{
    player.heat=clamp(player.heat-0.7,0,player.maxHeat);
  }
  if(pulseCd>0) pulseCd--;

  // shield regen
  if(player.shRegenDelay>0) player.shRegenDelay--;
  else if(player.shield<player.maxShield) player.shield=clamp(player.shield+0.18,0,player.maxShield);
  if(player.invuln>0) player.invuln--;

  // ---- bullets ----
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.trail.length>6) b.trail.shift();
    b.trail.push({x:b.x,y:b.y});
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0||b.x<-40||b.x>W+40||b.y<-40||b.y>H+40) bullets.splice(i,1);
  }
  bulletHits();

  // ---- enemy bullets ----
  for(let i=ebullets.length-1;i>=0;i--){
    const b=ebullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    let gone = b.life<=0||b.x<-40||b.x>W+40||b.y<-40||b.y>H+40;
    if(!gone && player.invuln<=0){
      const rr=b.r+12;
      if(dist2(b.x,b.y,player.x,player.y)<rr*rr){ hitPlayer(b.dmg,b.x,b.y); gone=true; }
    }
    if(gone) ebullets.splice(i,1);
  }

  // ---- enemies ----
  for(const e of enemies) if(!e.dead) updateEnemy(e);
  // enemy contact with player
  if(player.invuln<=0){
    for(const e of enemies){
      if(e.dead) continue;
      const rr=e.r+11;
      if(dist2(e.x,e.y,player.x,player.y)<rr*rr){
        hitPlayer(e.type==='boss'?26:14, player.x,player.y);
        // knockback both
        const a=angTo(e.x,e.y,player.x,player.y);
        player.vx+=Math.cos(a)*6; player.vy+=Math.sin(a)*6;
        e.vx-=Math.cos(a)*5; e.vy-=Math.sin(a)*5;
        if(e.type!=='boss') damageEnemy(e,24,e.x,e.y,'#ffffff');
        break;
      }
    }
  }
  // cleanup dead
  for(let i=enemies.length-1;i>=0;i--) if(enemies[i].dead) enemies.splice(i,1);

  // ---- drops ----
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    d.phase+=0.1; d.life--;
    // gentle attraction when near
    const dd=Math.hypot(player.x-d.x,player.y-d.y);
    if(dd<150){ const a=angTo(d.x,d.y,player.x,player.y); d.vx+=Math.cos(a)*0.4; d.vy+=Math.sin(a)*0.4; }
    d.vx*=0.95; d.vy*=0.95; d.x+=d.vx; d.y+=d.vy;
    if(dd<22){
      if(d.kind==='hp'){ player.hp=clamp(player.hp+28,0,player.maxHp); texts.push({x:d.x,y:d.y,vy:-0.8,life:46,max:46,txt:'+HULL',col:'#ff6b9d'});}
      else { player.shield=clamp(player.shield+40,0,player.maxShield); texts.push({x:d.x,y:d.y,vy:-0.8,life:46,max:46,txt:'+SHIELD',col:'#7df9ff'});}
      spark(d.x,d.y,d.kind==='hp'?'#ff6b9d':'#7df9ff',{count:14,speed:4});
      drops.splice(i,1); continue;
    }
    if(d.life<=0) drops.splice(i,1);
  }

  // ---- particles ----
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vx*=p.drag; p.vy*=p.drag; p.vy+=p.grav;
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
  // ---- shockwaves ----
  for(let i=shockwaves.length-1;i>=0;i--){
    const s=shockwaves[i];
    s.r+=(s.max-s.r)*0.18; s.life-=0.045;
    if(s.life<=0||s.r>=s.max-1) shockwaves.splice(i,1);
  }
  // ---- floating text ----
  for(let i=texts.length-1;i>=0;i--){
    const t=texts[i]; t.y+=t.vy; t.life--; if(t.life<=0) texts.splice(i,1);
  }

  // ---- chain timer ----
  if(chainTimer>0) chainTimer--; else if(chain>1) chain=Math.max(1,chain-1), chainTimer=20;

  // ---- waves ----
  if(enemies.length===0 && killsThisWave>=waveQuota && betweenWaves<=0){
    betweenWaves=110;
  }
  if(betweenWaves>0){ betweenWaves--; if(betweenWaves===0) startWave(); }

  // ---- juice decay ----
  shake*=0.88; if(shake<0.3) shake=0;
  hitFlash*=0.9; if(hitFlash<0.01) hitFlash=0;
  if(slowmo>0) slowmo--;

  // ---- death ----
  if(player.hp<=0){ gameOver(); }

  syncHUD();
}

function hitPlayer(dmg,hx,hy){
  player.shRegenDelay=120;
  if(player.shield>0){
    const absorbed=Math.min(player.shield,dmg);
    player.shield-=absorbed; dmg-=absorbed;
    spark(player.x,player.y,'#7df9ff',{count:10,speed:4});
    shockwaves.push({x:player.x,y:player.y,r:8,max:36,life:1,col:'#21f3ff',w:2});
  }
  if(dmg>0){ player.hp-=dmg; hitFlash=Math.max(hitFlash,0.4); }
  player.invuln=45;
  shake=Math.max(shake,9);
  spark(hx,hy,'#ff2bd6',{count:10,speed:4});
  // chain breaks on hit
  chain=1; chainTimer=0;
}

/* ====================== rendering ====================== */
function drawBackground(camx,camy){
  // base gradient sky
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0420');
  g.addColorStop(0.55,'#160a33');
  g.addColorStop(0.62,'#2a0f4a');
  g.addColorStop(1,'#05030d');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // nebula blobs (additive)
  ctx.globalCompositeOperation='lighter';
  for(const n of neb){
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<-.2)n.x=1.2; if(n.x>1.2)n.x=-.2;
    if(n.y<-.2)n.y=1.2; if(n.y>1.2)n.y=-.2;
    const cx=n.x*W, cy=n.y*H, rr=n.r*Math.max(W,H);
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,rr);
    rg.addColorStop(0,n.c+'30');
    rg.addColorStop(1,n.c+'00');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(cx,cy,rr,0,TAU); ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  // stars with parallax + twinkle
  for(const s of stars){
    const px=(s.x - camx*s.z*0.06) ;
    const py=(s.y - camy*s.z*0.06) ;
    const x=((px%W)+W)%W, y=((py%H)+H)%H;
    const tw=0.5+0.5*Math.sin(frame*0.05+s.tw);
    ctx.globalAlpha=0.35+0.6*tw*s.z;
    ctx.fillStyle=s.c;
    ctx.beginPath(); ctx.arc(x,y,s.r,0,TAU); ctx.fill();
  }
  ctx.globalAlpha=1;

  // synth horizon grid (lower portion)
  drawHorizonGrid(camx,camy);
}
function drawHorizonGrid(camx,camy){
  const hY=H*0.62;
  ctx.save();
  ctx.strokeStyle='rgba(255,43,214,0.35)';
  ctx.lineWidth=1;
  ctx.beginPath();
  // horizon line
  ctx.moveTo(0,hY); ctx.lineTo(W,hY);
  ctx.stroke();
  // glow on horizon
  const hg=ctx.createLinearGradient(0,hY-40,0,hY+10);
  hg.addColorStop(0,'rgba(255,43,214,0)');
  hg.addColorStop(1,'rgba(255,43,214,0.25)');
  ctx.fillStyle=hg; ctx.fillRect(0,hY-40,W,50);

  ctx.strokeStyle='rgba(33,243,255,0.18)';
  ctx.lineWidth=1;
  // horizontal perspective lines below horizon
  const rows=14;
  const scroll=(frame*1.6 + camy*0.1);
  for(let i=1;i<=rows;i++){
    const t=i/rows;
    const yy=hY + Math.pow(t,1.8)*(H-hY) + (scroll % ((H-hY)/rows));
    if(yy>H) continue;
    ctx.globalAlpha=0.5*(1-t)+0.1;
    ctx.beginPath(); ctx.moveTo(0,yy); ctx.lineTo(W,yy); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // vertical converging lines
  ctx.strokeStyle='rgba(155,107,255,0.16)';
  const vanX=W/2 - camx*0.05;
  const cols=18;
  for(let i=0;i<=cols;i++){
    const fx=(i/cols)*W;
    ctx.beginPath();
    ctx.moveTo(vanX,hY);
    ctx.lineTo(fx,H);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer(){
  const p=player;
  // trail ribbon
  if(p.trail.length>1){
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<p.trail.length-1;i++){
      const a=i/p.trail.length;
      ctx.strokeStyle=`rgba(33,243,255,${a*0.4})`;
      ctx.lineWidth=a*6;
      ctx.beginPath();
      ctx.moveTo(p.trail[i].x,p.trail[i].y);
      ctx.lineTo(p.trail[i+1].x,p.trail[i+1].y);
      ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over';
  }
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(p.ang);
  // engine flame
  const flame = (p.boost?20:9)+rand(0,7);
  ctx.globalCompositeOperation='lighter';
  const fg=ctx.createLinearGradient(-10,0,-10-flame,0);
  fg.addColorStop(0, p.boost?'rgba(255,176,32,0.95)':'rgba(33,243,255,0.9)');
  fg.addColorStop(1,'rgba(255,43,214,0)');
  ctx.fillStyle=fg;
  ctx.beginPath();
  ctx.moveTo(-10,-5); ctx.lineTo(-10-flame,0); ctx.lineTo(-10,5); ctx.closePath();
  ctx.fill();
  ctx.globalCompositeOperation='source-over';

  // hull glow
  ctx.shadowBlur=18; ctx.shadowColor='#21f3ff';
  ctx.lineWidth=2;
  ctx.strokeStyle = p.invuln>0 && (frame%6<3) ? '#ffffff' : '#21f3ff';
  ctx.fillStyle='rgba(33,243,255,0.10)';
  ctx.beginPath();
  ctx.moveTo(18,0);
  ctx.lineTo(-8,-10);
  ctx.lineTo(-4,0);
  ctx.lineTo(-8,10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // cockpit core
  ctx.shadowBlur=14; ctx.shadowColor='#ff2bd6';
  ctx.fillStyle='#ff2bd6';
  ctx.beginPath(); ctx.arc(3,0,3,0,TAU); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();

  // shield bubble
  if(p.shield>0){
    ctx.save();
    ctx.globalAlpha=0.12+0.12*(p.shield/p.maxShield);
    ctx.strokeStyle='#7df9ff'; ctx.lineWidth=2;
    ctx.shadowBlur=14; ctx.shadowColor='#21f3ff';
    ctx.beginPath(); ctx.arc(p.x,p.y,22,0,TAU); ctx.stroke();
    ctx.restore();
  }
  // charge orb
  if(charge.active && charge.t>20){
    const pw=clamp(charge.t/55,0,1);
    const ox=p.x+Math.cos(p.ang)*18, oy=p.y+Math.sin(p.ang)*18;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const og=ctx.createRadialGradient(ox,oy,0,ox,oy,6+pw*12);
    og.addColorStop(0,'#ffffff');
    og.addColorStop(0.4,'#9b6bff');
    og.addColorStop(1,'rgba(155,107,255,0)');
    ctx.fillStyle=og;
    ctx.beginPath(); ctx.arc(ox,oy,6+pw*12,0,TAU); ctx.fill();
    ctx.restore();
  }
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  ctx.rotate(e.ang);
  const flash = e.hitTimer>0;
  ctx.lineWidth=2;
  ctx.shadowBlur= e.type==='boss'?28:14;
  ctx.shadowColor=e.col;
  ctx.strokeStyle = flash? '#ffffff' : e.col;
  ctx.fillStyle = e.col+'22';
  switch(e.type){
    case 'swarmer': case 'mini':{
      const r=e.r;
      ctx.beginPath();
      ctx.moveTo(r,0); ctx.lineTo(-r*0.7,-r*0.8); ctx.lineTo(-r*0.3,0); ctx.lineTo(-r*0.7,r*0.8);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    }
    case 'weaver':{
      const r=e.r;
      ctx.beginPath();
      ctx.moveTo(r,0); ctx.lineTo(0,-r); ctx.lineTo(-r,0); ctx.lineTo(0,r); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,r*0.32,0,TAU); ctx.stroke();
      break;
    }
    case 'turret':{
      const r=e.r;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*TAU/6; const px=Math.cos(a)*r,py=Math.sin(a)*r; i?ctx.lineTo(px,py):ctx.moveTo(px,py);}
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // barrel
      ctx.fillStyle=e.col; ctx.fillRect(0,-3,r+8,6);
      ctx.beginPath(); ctx.arc(0,0,r*0.4,0,TAU); ctx.fillStyle='#ff2bd6'; ctx.fill();
      break;
    }
    case 'splitter':{
      const r=e.r;
      ctx.rotate(e.phase*0.3);
      ctx.beginPath();
      for(let i=0;i<8;i++){const a=i*TAU/8; const rr=i%2?r:r*0.55; const px=Math.cos(a)*rr,py=Math.sin(a)*rr; i?ctx.lineTo(px,py):ctx.moveTo(px,py);}
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,r*0.3,0,TAU); ctx.fillStyle='#c79bff'; ctx.fill();
      break;
    }
    case 'boss':{
      const r=e.r;
      // rotating outer ring
      ctx.save(); ctx.rotate(e.ringAng);
      ctx.strokeStyle=flash?'#fff':'#ff7fc6'; ctx.lineWidth=3;
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.arc(0,0,r+8+i*6, i*0.5, i*0.5+Math.PI*1.2);
        ctx.stroke();
      }
      ctx.restore();
      // body
      ctx.beginPath();
      for(let i=0;i<10;i++){const a=i*TAU/10; const rr=i%2?r:r*0.7; const px=Math.cos(a)*rr,py=Math.sin(a)*rr; i?ctx.lineTo(px,py):ctx.moveTo(px,py);}
      ctx.closePath(); ctx.fillStyle='rgba(255,43,214,0.18)'; ctx.fill(); ctx.stroke();
      // core pulse
      const cp=0.5+0.5*Math.sin(frame*0.1);
      const cg=ctx.createRadialGradient(0,0,0,0,0,r*0.6);
      cg.addColorStop(0,'#ffffff'); cg.addColorStop(0.5,'#ff2bd6'); cg.addColorStop(1,'rgba(255,43,214,0)');
      ctx.globalAlpha=0.6+0.4*cp; ctx.fillStyle=cg;
      ctx.beginPath(); ctx.arc(0,0,r*0.6,0,TAU); ctx.fill(); ctx.globalAlpha=1;
      break;
    }
  }
  ctx.shadowBlur=0;
  ctx.restore();

  // health bar
  if(e.hp<e.maxHp){
    const bw = e.type==='boss'? Math.min(W*0.5,520) : e.r*2.4;
    const bx = e.type==='boss'? (W-bw)/2 : e.x-bw/2;
    const by = e.type==='boss'? 28 : e.y-e.r-12;
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.fillRect(bx,by,bw,e.type==='boss'?7:3);
    ctx.fillStyle=e.type==='boss'?'#ff2bd6':e.col;
    ctx.shadowBlur=8; ctx.shadowColor=ctx.fillStyle;
    ctx.fillRect(bx,by,bw*clamp(e.hp/e.maxHp,0,1),e.type==='boss'?7:3);
    ctx.shadowBlur=0;
    if(e.type==='boss'){
      ctx.fillStyle='#ffd0f4'; ctx.font='10px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('CORE BREACH',W/2,by-6); ctx.textAlign='left';
    }
  }
}

function drawScene(){
  // screen shake offset
  const sx=(Math.random()-0.5)*shake;
  const sy=(Math.random()-0.5)*shake;
  ctx.save();
  ctx.translate(sx,sy);

  const camx = player.x - W/2;
  const camy = player.y - H/2;
  drawBackground(camx,camy);

  // shockwaves (rings)
  ctx.globalCompositeOperation='lighter';
  for(const s of shockwaves){
    ctx.globalAlpha=clamp(s.life,0,1);
    ctx.strokeStyle=s.col; ctx.lineWidth=s.w;
    ctx.shadowBlur=20; ctx.shadowColor=s.col;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.stroke();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';

  // particles (additive glow)
  ctx.globalCompositeOperation='lighter';
  for(const p of particles){
    const a=clamp(p.life/p.max,0,1);
    ctx.globalAlpha=a;
    ctx.fillStyle=p.col;
    if(p.glow){ ctx.shadowBlur=8; ctx.shadowColor=p.col; }
    ctx.beginPath();
    ctx.arc(p.x,p.y,Math.max(0.4,p.size*a),0,TAU);
    ctx.fill();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';

  // drops
  for(const d of drops){
    const pulse=0.7+0.3*Math.sin(d.phase);
    const col=d.kind==='hp'?'#ff6b9d':'#7df9ff';
    ctx.save();
    ctx.translate(d.x,d.y); ctx.rotate(d.phase*0.5);
    ctx.shadowBlur=16; ctx.shadowColor=col;
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.globalAlpha=d.life<90?d.life/90:1;
    ctx.beginPath();
    const r=9*pulse;
    ctx.moveTo(0,-r); ctx.lineTo(r,0); ctx.lineTo(0,r); ctx.lineTo(-r,0); ctx.closePath();
    ctx.stroke();
    ctx.fillStyle=col; ctx.font='bold 10px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(d.kind==='hp'?'+':'S',0,0.5);
    ctx.restore();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.textAlign='left'; ctx.textBaseline='alphabetic';

  // enemy bullets
  ctx.globalCompositeOperation='lighter';
  for(const b of ebullets){
    ctx.fillStyle=b.col; ctx.shadowBlur=10; ctx.shadowColor=b.col;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.4,0,TAU); ctx.fill();
  }
  // player bullets
  for(const b of bullets){
    const col=b.charged?'#9b6bff':'#21f3ff';
    if(b.trail.length>1){
      ctx.strokeStyle=col; ctx.lineWidth=b.r*0.9; ctx.shadowBlur=14; ctx.shadowColor=col;
      ctx.beginPath();
      ctx.moveTo(b.trail[0].x,b.trail[0].y);
      for(let i=1;i<b.trail.length;i++) ctx.lineTo(b.trail[i].x,b.trail[i].y);
      ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    ctx.fillStyle='#fff'; ctx.shadowBlur=16; ctx.shadowColor=col;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,TAU); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.globalCompositeOperation='source-over';

  // enemies
  for(const e of enemies) if(!e.dead) drawEnemy(e);

  // player
  if(state==='playing') drawPlayer();

  // floating texts
  ctx.textAlign='center';
  for(const t of texts){
    ctx.globalAlpha=clamp(t.life/t.max,0,1);
    ctx.fillStyle=t.col; ctx.font='bold 16px Segoe UI';
    ctx.shadowBlur=8; ctx.shadowColor=t.col;
    ctx.fillText(t.txt,t.x,t.y);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.textAlign='left';

  ctx.restore();

  // hit flash full-screen
  if(hitFlash>0){
    ctx.fillStyle=`rgba(255,43,214,${hitFlash*0.4})`;
    ctx.fillRect(0,0,W,H);
  }
  // vignette
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.4,W/2,H/2,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

/* ====================== menu background sim ====================== */
let menuT=0;
function updateMenuBg(){
  menuT++;
  // gentle drifting sparks for ambience on menu
  if(menuT%5===0){
    spark(rand(0,W),H+10,'#9b6bff',{count:1,speed:1.5,dir:-Math.PI/2,spread:0.6,life:120,size:2,drag:0.99,grav:-0.01});
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vx*=p.drag; p.vy*=p.drag; p.vy+=p.grav;
    p.x+=p.vx; p.y+=p.vy; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawMenuScene(){
  const camx=0,camy=0;
  drawBackground(camx,camy);
  ctx.globalCompositeOperation='lighter';
  for(const p of particles){
    const a=clamp(p.life/p.max,0,1);
    ctx.globalAlpha=a*0.7; ctx.fillStyle=p.col;
    ctx.shadowBlur=8; ctx.shadowColor=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*a,0,TAU); ctx.fill();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

/* ====================== flow ====================== */
function startGame(){
  state='playing';
  score=0; chain=1; chainTimer=0; wave=0; totalKills=0; betweenWaves=0;
  bullets.length=0; ebullets.length=0; enemies.length=0;
  particles.length=0; shockwaves.length=0; drops.length=0; texts.length=0;
  pulseCd=0;
  resetPlayer();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  hud.style.display='block';
  $heat.style.background='linear-gradient(90deg,#ffb020,#ff5a3c)';
  startWave();
  syncHUD();
}
function gameOver(){
  state='over';
  const isNew = score>best;
  if(isNew){ best=score; localStorage.setItem('hyperlance_best',String(best)); }
  // explode the player dramatically
  burst(player.x,player.y,['#21f3ff','#ff2bd6','#ffffff','#9b6bff'],80,9);
  shake=Math.max(shake,26); hitFlash=Math.max(hitFlash,0.6);
  document.getElementById('overScore').textContent=score.toLocaleString();
  const $b=document.getElementById('overBest');
  $b.textContent=(isNew?'NEW BEST ':'BEST ')+best.toLocaleString();
  $b.classList.toggle('new',isNew);
  document.getElementById('overStats').textContent='WAVES CLEARED '+Math.max(0,wave-1)+'   ·   KILLS '+totalKills;
  hud.style.display='none';
  setTimeout(()=>document.getElementById('overScreen').classList.remove('hidden'),700);
}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);

/* ====================== loop ====================== */
let last=performance.now();
function loop(now){
  const dt=Math.min(50,now-last); last=now;
  // simple fixed-step-ish: run one update (slowmo skips some frames)
  if(slowmo>0 && frame%2===0){ /* render only -> half speed feel */ }
  else update(dt);
  if(state==='menu') drawMenuScene();
  else drawScene();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
