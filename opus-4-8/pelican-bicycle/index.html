<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelican on a Bicycle &middot; Opus 4.8</title>
<style>
  :root{
    --ink:#1c2b3a;
    --sea:#0e7c9b;
    --sun:#ffd166;
    --coral:#ef6f53;
    --paper:#fef6e9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:1.6rem;
    padding:2.2rem 1rem 3rem;
    font-family:"Avenir Next","Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #fff4d6 0%, transparent 60%),
      linear-gradient(180deg,#ffe7b3 0%, #ffd9a0 22%, #ffc8c1 55%, #ffe8d6 100%);
    overflow-x:hidden;
  }
  .masthead{text-align:center;max-width:760px}
  .eyebrow{
    display:inline-block;
    font-size:.72rem;
    letter-spacing:.32em;
    text-transform:uppercase;
    font-weight:700;
    color:var(--coral);
    padding:.4rem .9rem;
    border:1.5px solid rgba(239,111,83,.35);
    border-radius:999px;
    background:rgba(255,255,255,.45);
    backdrop-filter:blur(6px);
  }
  h1{
    margin-top:.9rem;
    font-size:clamp(2rem,5vw,3.3rem);
    line-height:1.02;
    font-weight:800;
    letter-spacing:-.02em;
    color:var(--ink);
  }
  h1 em{
    font-style:normal;
    background:linear-gradient(120deg,var(--coral),#f0a24b 60%,var(--sea));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .masthead p{
    margin-top:.6rem;
    color:#5a6b76;
    font-size:1.02rem;
  }
  .stage{
    position:relative;
    width:min(94vw,920px);
    border-radius:28px;
    overflow:hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,.7) inset,
      0 30px 70px -28px rgba(28,43,58,.55),
      0 6px 20px -10px rgba(28,43,58,.4);
    border:1px solid rgba(255,255,255,.55);
  }
  .stage svg{display:block;width:100%;height:auto}
  .credit{
    display:flex;
    align-items:center;
    gap:.6rem;
    font-size:.85rem;
    color:#5a6b76;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);
    box-shadow:0 0 0 4px rgba(239,111,83,.18)}

  /* ---------- animations ---------- */
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes crankSpin{to{transform:rotate(360deg)}}
  @keyframes bob{
    0%,100%{transform:translateY(0) rotate(-.4deg)}
    50%{transform:translateY(-7px) rotate(.4deg)}
  }
  @keyframes legPump{
    0%,100%{transform:rotate(14deg)}
    50%{transform:rotate(-20deg)}
  }
  @keyframes legPumpAlt{
    0%,100%{transform:rotate(-20deg)}
    50%{transform:rotate(14deg)}
  }
  @keyframes pouchJiggle{
    0%,100%{transform:translateY(0) scaleY(1)}
    50%{transform:translateY(2px) scaleY(1.05)}
  }
  @keyframes drift{from{transform:translateX(0)}to{transform:translateX(-260px)}}
  @keyframes driftSlow{from{transform:translateX(0)}to{transform:translateX(-220px)}}
  @keyframes dash{to{stroke-dashoffset:-120}}
  @keyframes sway{
    0%,100%{transform:rotate(-2deg)}
    50%{transform:rotate(3deg)}
  }
  @keyframes sun{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
  @keyframes flap{
    0%,100%{transform:rotate(0deg)}
    50%{transform:rotate(-9deg)}
  }
  @keyframes gust{
    0%{opacity:0;transform:translateX(40px)}
    30%{opacity:.7}
    100%{opacity:0;transform:translateX(-90px)}
  }

  #backWheel,#frontWheel{animation:spin 1.15s linear infinite;transform-origin:center}
  #crank{animation:crankSpin 1.15s linear infinite;transform-origin:359px 372px}
  #rider{animation:bob 1.15s ease-in-out infinite;transform-origin:340px 300px}
  #legFront{animation:legPump 1.15s ease-in-out infinite;transform-origin:336px 322px}
  #legBack{animation:legPumpAlt 1.15s ease-in-out infinite;transform-origin:320px 322px}
  #pouch{animation:pouchJiggle 1.15s ease-in-out infinite;transform-origin:430px 232px}
  #wingFront{animation:flap 1.15s ease-in-out infinite;transform-origin:312px 300px}
  #eyeLid{animation:blink 5s ease-in-out infinite;transform-origin:401px 196px}

  .hills-back{animation:driftSlow 14s linear infinite}
  .hills-front{animation:drift 9s linear infinite}
  .lane{animation:dash 1.15s linear infinite}
  .sun{animation:sun 6s ease-in-out infinite;transform-origin:705px 120px}
  .palm{animation:sway 5s ease-in-out infinite}
  .gust{animation:gust 1.6s ease-in infinite}
  .gust.g2{animation-delay:.55s}
  .gust.g3{animation-delay:1.05s}
  .cloud-a{animation:drift 26s linear infinite}
  .cloud-b{animation:driftSlow 34s linear infinite}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
  }
</style>
</head>
<body>
  <header class="masthead">
    <span class="eyebrow">Claude Opus 4.8 &middot; SVG Showcase</span>
    <h1>A Pelican <em>Riding a Bicycle</em></h1>
    <p>One hand-drawn inline SVG, pure CSS motion &mdash; pedaling down a sunny seaside boardwalk.</p>
  </header>

  <main class="stage">
    <svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="A cartoon pelican wearing a sailor cap riding a bicycle along a coastal road">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#bdeaf6"/>
          <stop offset="55%" stop-color="#e9f7fb"/>
          <stop offset="100%" stop-color="#fdf3e0"/>
        </linearGradient>
        <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#3fb8d6"/>
          <stop offset="100%" stop-color="#1d8fb3"/>
        </linearGradient>
        <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#c9a06b"/>
          <stop offset="100%" stop-color="#a6794a"/>
        </linearGradient>
        <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#e3ecf2"/>
        </linearGradient>
        <linearGradient id="wingG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#eef3f7"/>
          <stop offset="100%" stop-color="#c3d2dd"/>
        </linearGradient>
        <linearGradient id="beakG" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#ffc14d"/>
          <stop offset="100%" stop-color="#f59324"/>
        </linearGradient>
        <linearGradient id="pouchG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffb43f"/>
          <stop offset="100%" stop-color="#ef7a1e"/>
        </linearGradient>
        <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ff7a59"/>
          <stop offset="100%" stop-color="#e0492b"/>
        </linearGradient>
        <radialGradient id="sunG" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#fff4c2"/>
          <stop offset="60%" stop-color="#ffd24a"/>
          <stop offset="100%" stop-color="#ffb938"/>
        </radialGradient>
        <radialGradient id="vig" cx="50%" cy="44%" r="72%">
          <stop offset="70%" stop-color="rgba(0,0,0,0)"/>
          <stop offset="100%" stop-color="rgba(20,40,55,.18)"/>
        </radialGradient>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6"/>
        </filter>
      </defs>

      <!-- SKY -->
      <rect width="900" height="560" fill="url(#sky)"/>

      <!-- SUN -->
      <g class="sun">
        <circle cx="705" cy="120" r="52" fill="#ffe9a8" opacity=".5"/>
        <circle cx="705" cy="120" r="40" fill="url(#sunG)"/>
      </g>

      <!-- CLOUDS -->
      <g fill="#ffffff" opacity=".92">
        <g class="cloud-a">
          <g transform="translate(120 90)">
            <ellipse cx="0" cy="0" rx="46" ry="22"/>
            <ellipse cx="34" cy="-10" rx="38" ry="26"/>
            <ellipse cx="-34" cy="6" rx="32" ry="18"/>
          </g>
          <g transform="translate(560 70)" opacity=".85">
            <ellipse cx="0" cy="0" rx="40" ry="19"/>
            <ellipse cx="30" cy="-8" rx="30" ry="22"/>
            <ellipse cx="-28" cy="5" rx="26" ry="15"/>
          </g>
          <g transform="translate(980 110)">
            <ellipse cx="0" cy="0" rx="46" ry="22"/>
            <ellipse cx="34" cy="-10" rx="38" ry="26"/>
          </g>
        </g>
        <g class="cloud-b" opacity=".7">
          <g transform="translate(330 55)">
            <ellipse cx="0" cy="0" rx="36" ry="16"/>
            <ellipse cx="26" cy="-7" rx="28" ry="20"/>
          </g>
          <g transform="translate(820 165)">
            <ellipse cx="0" cy="0" rx="34" ry="15"/>
            <ellipse cx="24" cy="-6" rx="26" ry="18"/>
          </g>
        </g>
      </g>

      <!-- SEA STRIP -->
      <rect x="0" y="300" width="900" height="70" fill="url(#sea)"/>
      <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity=".55">
        <line class="hills-back" x1="40"  y1="330" x2="90"  y2="330"/>
        <line class="hills-back" x1="200" y1="345" x2="250" y2="345"/>
        <line class="hills-back" x1="420" y1="328" x2="470" y2="328"/>
        <line class="hills-back" x1="640" y1="350" x2="690" y2="350"/>
        <line class="hills-back" x1="820" y1="334" x2="870" y2="334"/>
      </g>

      <!-- DISTANT HILLS -->
      <g class="hills-back">
        <path d="M-40 308 Q 120 252 300 300 T 640 296 T 1180 308 L1180 360 L-40 360 Z" fill="#8fd0a6" opacity=".9"/>
      </g>

      <!-- BEACH / GREEN BANK -->
      <path d="M0 360 Q 200 348 450 356 Q 700 364 900 352 L900 560 L0 560 Z" fill="#f1d9a6"/>

      <!-- PALM TREE (left) -->
      <g class="palm" transform="translate(96 360)" style="transform-origin:96px 360px">
        <rect x="-7" y="-86" width="14" height="92" rx="6" fill="#9c6b3f"/>
        <g fill="#3fa86a">
          <path d="M0 -86 Q -52 -104 -84 -78 Q -44 -96 0 -82 Z"/>
          <path d="M0 -86 Q 52 -104 84 -78 Q 44 -96 0 -82 Z"/>
          <path d="M0 -88 Q -36 -134 -68 -132 Q -28 -120 0 -84 Z"/>
          <path d="M0 -88 Q 36 -134 68 -132 Q 28 -120 0 -84 Z"/>
          <path d="M0 -90 Q -4 -140 14 -160 Q 6 -126 6 -86 Z"/>
        </g>
        <circle cx="-4" cy="-86" r="6" fill="#caa15f"/>
      </g>

      <!-- ROAD -->
      <rect x="0" y="438" width="900" height="122" fill="url(#road)"/>
      <rect x="0" y="438" width="900" height="6" fill="#dcb985"/>
      <!-- moving lane dashes -->
      <line class="lane" x1="0" y1="500" x2="900" y2="500"
            stroke="#fff6e2" stroke-width="7" stroke-linecap="round"
            stroke-dasharray="46 44" opacity=".85"/>

      <!-- moving foreground pebbles -->
      <g class="hills-front" fill="#7c5733" opacity=".5">
        <circle cx="60"  cy="540" r="6"/>
        <circle cx="240" cy="528" r="4"/>
        <circle cx="430" cy="544" r="7"/>
        <circle cx="650" cy="530" r="5"/>
        <circle cx="860" cy="542" r="6"/>
        <circle cx="1060" cy="536" r="5"/>
      </g>

      <!-- contact shadow -->
      <ellipse cx="440" cy="470" rx="200" ry="20" fill="rgba(30,40,40,.22)" filter="url(#soft)"/>

      <!-- ============ BICYCLE ============ -->
      <g id="bicycle" stroke-linecap="round" stroke-linejoin="round">
        <!-- back wheel -->
        <g id="backWheel" style="transform-origin:230px 432px">
          <circle cx="230" cy="432" r="62" fill="#2a3540"/>
          <circle cx="230" cy="432" r="58" fill="none" stroke="#cfd9e0" stroke-width="3"/>
          <circle cx="230" cy="432" r="50" fill="#f3f6f8"/>
          <g stroke="#9fb0bb" stroke-width="2.4">
            <line x1="230" y1="382" x2="230" y2="482"/>
            <line x1="180" y1="432" x2="280" y2="432"/>
            <line x1="195" y1="397" x2="265" y2="467"/>
            <line x1="265" y1="397" x2="195" y2="467"/>
            <line x1="205" y1="408" x2="255" y2="456"/>
            <line x1="255" y1="408" x2="205" y2="456"/>
          </g>
          <circle cx="230" cy="432" r="8" fill="#54636e"/>
        </g>
        <!-- front wheel -->
        <g id="frontWheel" style="transform-origin:610px 432px">
          <circle cx="610" cy="432" r="62" fill="#2a3540"/>
          <circle cx="610" cy="432" r="58" fill="none" stroke="#cfd9e0" stroke-width="3"/>
          <circle cx="610" cy="432" r="50" fill="#f3f6f8"/>
          <g stroke="#9fb0bb" stroke-width="2.4">
            <line x1="610" y1="382" x2="610" y2="482"/>
            <line x1="560" y1="432" x2="660" y2="432"/>
            <line x1="575" y1="397" x2="645" y2="467"/>
            <line x1="645" y1="397" x2="575" y2="467"/>
            <line x1="585" y1="408" x2="635" y2="456"/>
            <line x1="635" y1="408" x2="585" y2="456"/>
          </g>
          <circle cx="610" cy="432" r="8" fill="#54636e"/>
        </g>

        <!-- frame -->
        <g fill="none" stroke="url(#frame)" stroke-width="11">
          <line x1="230" y1="432" x2="359" y2="372"/>   <!-- chain stay -->
          <line x1="359" y1="372" x2="300" y2="300"/>   <!-- seat tube -->
          <line x1="300" y1="300" x2="540" y2="300"/>   <!-- top tube -->
          <line x1="540" y1="300" x2="610" y2="432"/>   <!-- fork/down to front hub -->
          <line x1="359" y1="372" x2="540" y2="300"/>   <!-- down tube -->
        </g>

        <!-- crank + chainring -->
        <circle cx="359" cy="372" r="17" fill="none" stroke="#5b6b76" stroke-width="4"/>
        <circle cx="359" cy="372" r="6" fill="#46545e"/>
        <g id="crank" style="transform-origin:359px 372px">
          <line x1="359" y1="372" x2="359" y2="404" stroke="#3a4751" stroke-width="6"/>
          <line x1="359" y1="372" x2="359" y2="340" stroke="#3a4751" stroke-width="6"/>
          <rect x="349" y="402" width="26" height="9" rx="3" fill="#2a3540"/>
          <rect x="343" y="333" width="26" height="9" rx="3" fill="#2a3540"/>
        </g>

        <!-- seat post + saddle -->
        <line x1="300" y1="300" x2="288" y2="262" stroke="#46545e" stroke-width="7"/>
        <path d="M262 262 Q 290 250 318 260 Q 312 274 280 274 Q 262 272 262 262 Z" fill="#3a2a1c"/>

        <!-- handlebar + stem -->
        <line x1="540" y1="300" x2="556" y2="252" stroke="#46545e" stroke-width="7"/>
        <path d="M556 252 Q 590 240 602 262" fill="none" stroke="#3a4751" stroke-width="8"/>
        <circle cx="602" cy="262" r="7" fill="#2a3540"/>
      </g>

      <!-- ============ PELICAN RIDER ============ -->
      <g id="rider" style="transform-origin:340px 300px">

        <!-- BACK LEG -->
        <g id="legBack" style="transform-origin:320px 322px">
          <path d="M320 322 L 350 380 L 343 402" fill="none" stroke="#e0851f"
                stroke-width="11" stroke-linecap="round"/>
          <path d="M343 402 L 326 414 L 356 414 Z" fill="#e0851f"/>
        </g>

        <!-- TAIL -->
        <path d="M250 300 Q 214 300 196 320 Q 224 318 244 320 Z" fill="#cdd9e1"/>
        <path d="M252 314 Q 218 322 202 342 Q 230 332 250 332 Z" fill="#b6c6d1"/>

        <!-- BODY -->
        <path d="M250 318
                 Q 238 258 300 244
                 Q 372 232 388 286
                 Q 396 332 360 350
                 Q 300 366 262 348
                 Q 250 338 250 318 Z"
              fill="url(#bodyG)" stroke="#d5e0e8" stroke-width="2"/>

        <!-- BACK WING (subtle) -->
        <path d="M286 268 Q 250 286 268 330 Q 300 326 322 300 Q 312 272 286 268 Z"
              fill="#d3dee6"/>

        <!-- NECK + HEAD -->
        <path d="M352 286
                 Q 372 250 380 218
                 Q 386 190 412 184"
              fill="none" stroke="url(#bodyG)" stroke-width="34" stroke-linecap="round"/>
        <path d="M352 286 Q 372 250 380 218 Q 386 190 412 184"
              fill="none" stroke="#dbe5ec" stroke-width="34" stroke-linecap="round" opacity=".0"/>

        <!-- head -->
        <circle cx="406" cy="194" r="30" fill="url(#bodyG)" stroke="#d5e0e8" stroke-width="2"/>

        <!-- SAILOR CAP -->
        <g>
          <path d="M380 176 Q 406 158 432 176 Q 432 184 406 184 Q 380 184 380 176 Z" fill="#f6f8fa"/>
          <ellipse cx="406" cy="176" rx="29" ry="9" fill="#1f3550"/>
          <path d="M379 176 Q 406 188 433 176" fill="none" stroke="#1f3550" stroke-width="6"/>
          <rect x="397" y="160" width="18" height="9" rx="2" fill="#2b4a6e"/>
          <circle cx="406" cy="160" r="5" fill="#ef6f53"/>
        </g>

        <!-- EYE -->
        <circle cx="416" cy="190" r="6.5" fill="#22303a"/>
        <circle cx="418" cy="188" r="2.2" fill="#fff"/>
        <rect id="eyeLid" x="408" y="182" width="16" height="9" rx="4" fill="url(#bodyG)"
              style="transform-origin:416px 190px"/>

        <!-- BEAK upper -->
        <path d="M432 188 Q 506 182 548 198 Q 530 210 488 206 Q 452 202 432 196 Z"
              fill="url(#beakG)" stroke="#d9821b" stroke-width="1.5"/>
        <!-- POUCH lower -->
        <g id="pouch" style="transform-origin:470px 210px">
          <path d="M432 198 Q 470 240 518 238 Q 548 234 548 200
                   Q 512 224 470 214 Q 448 208 432 200 Z"
                fill="url(#pouchG)" stroke="#d97216" stroke-width="1.5"/>
          <path d="M448 206 Q 480 224 512 222" fill="none" stroke="#c4630f" stroke-width="1.6" opacity=".5"/>
          <!-- a little fish peeking out -->
          <g transform="translate(498 226)">
            <ellipse cx="0" cy="0" rx="11" ry="6" fill="#7fd0e6"/>
            <path d="M9 0 L 18 -6 L 18 6 Z" fill="#7fd0e6"/>
            <circle cx="-5" cy="-1.5" r="1.6" fill="#1f3550"/>
          </g>
        </g>
        <line x1="446" y1="195" x2="520" y2="200" stroke="#c4630f" stroke-width="1.3" opacity=".5"/>

        <!-- FRONT WING (flapping) reaching toward handlebar -->
        <g id="wingFront" style="transform-origin:312px 300px">
          <path d="M300 286
                   Q 360 280 470 268
                   Q 520 266 552 280
                   Q 470 300 360 312
                   Q 312 314 300 300 Z"
                fill="url(#wingG)" stroke="#b9c8d3" stroke-width="2"/>
          <path d="M512 274 Q 540 276 556 282" fill="none" stroke="#9fb2bf" stroke-width="2"/>
          <path d="M470 282 Q 360 296 312 302" fill="none" stroke="#aebecb" stroke-width="2" opacity=".6"/>
          <!-- feather wingtip near grip -->
          <path d="M540 280 L 566 270 L 560 286 Z" fill="#cdd9e1"/>
        </g>

        <!-- FRONT LEG (on pedal) -->
        <g id="legFront" style="transform-origin:336px 322px">
          <path d="M336 322 L 362 380 L 359 402" fill="none" stroke="#f59324"
                stroke-width="11" stroke-linecap="round"/>
          <path d="M359 402 L 342 414 L 372 414 Z" fill="#f59324"/>
        </g>

        <!-- speed gusts behind rider -->
        <g stroke="#ffffff" stroke-width="4" stroke-linecap="round">
          <line class="gust"    x1="200" y1="250" x2="150" y2="250"/>
          <line class="gust g2" x1="210" y1="278" x2="150" y2="278"/>
          <line class="gust g3" x1="195" y1="306" x2="150" y2="306"/>
        </g>
      </g>

      <!-- gentle vignette -->
      <rect width="900" height="560" fill="url(#vig)"/>
    </svg>
  </main>

  <p class="credit"><span class="dot"></span> Inline SVG + CSS keyframes &middot; no scripts, no libraries</p>
</body>
</html>
