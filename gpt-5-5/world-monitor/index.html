<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #020408;
            --panel: #0a0f1a;
            --panel-hover: #0f1624;
            --border: rgba(255,255,255,0.05);
            --border-hover: rgba(255,255,255,0.1);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #334155;
            --green: #22c55e;
            --green-glow: rgba(34,197,94,0.15);
            --red: #ef4444;
            --red-glow: rgba(239,68,68,0.15);
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --cyan-glow: rgba(6,182,212,0.15);
            --indigo: #6366f1;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Scanline overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
        
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: rgba(10,15,26,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        
        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .header-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--cyan), var(--indigo));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .header-logo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15));
        }
        
        .header h1 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .model-badge {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            margin-top: 0.2rem;
            padding: 0.16rem 0.5rem;
            border: 1px solid rgba(6,182,212,0.32);
            border-radius: 999px;
            background: rgba(6,182,212,0.1);
            color: #67e8f9;
            font-size: 0.58rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .header-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .header-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .header-actions { display: flex; gap: 0.4rem; }
        
        .btn {
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn:hover { border-color: var(--border-hover); color: var(--text); }
        
        /* Clocks bar */
        .clocks-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1px;
            background: var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .clock-item {
            background: var(--panel);
            padding: 0.75rem 1rem;
            text-align: center;
            transition: background 0.2s;
        }
        
        .clock-item:hover { background: var(--panel-hover); }
        
        .clock-city {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }
        
        .clock-time {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .clock-status {
            font-size: 0.6rem;
            margin-top: 0.15rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .clock-status.open { color: var(--green); }
        .clock-status.closed { color: var(--red); }
        .clock-status.pre { color: var(--amber); }
        
        /* Ticker */
        .ticker-wrap {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            white-space: nowrap;
            padding: 0.5rem 0;
        }
        
        .ticker {
            display: inline-block;
            animation: ticker 40s linear infinite;
            padding-left: 100%;
        }
        
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        
        .ticker-item {
            display: inline-block;
            padding: 0 1.5rem;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .ticker-item .symbol { color: var(--text-muted); margin-right: 0.4rem; }
        .ticker-item .price { color: var(--text); font-weight: 600; }
        .ticker-item .change { margin-left: 0.4rem; font-weight: 500; }
        
        /* Layout */
        .dashboard {
            padding: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
        }
        
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }
        .col-8 { grid-column: span 8; }
        .col-12 { grid-column: span 12; }
        
        @media (max-width: 1200px) {
            .col-3, .col-4 { grid-column: span 6; }
        }
        
        @media (max-width: 768px) {
            .col-3, .col-4, .col-6, .col-8 { grid-column: span 12; }
        }
        
        /* Panel */
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        
        .panel-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        
        .panel-title .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        
        .panel-body {
            padding: 1rem 1.25rem;
        }
        
        /* Index cards */
        .index-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
        }
        
        .index-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.2s;
        }
        
        .index-card:hover { border-color: var(--border-hover); }
        
        .index-name {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }
        
        .index-value {
            font-size: 1.15rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.2rem;
        }
        
        .index-change {
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .spark-sm {
            height: 30px;
            margin-top: 0.5rem;
        }
        
        /* Stock rows */
        .stock-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .stock-row:last-child { border-bottom: none; }
        
        .stock-info { display: flex; align-items: center; gap: 0.75rem; }
        
        .stock-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
        }
        
        .stock-name { font-size: 0.85rem; font-weight: 600; }
        .stock-symbol { font-size: 0.7rem; color: var(--text-muted); }
        
        .stock-price {
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .stock-price-val { font-size: 0.9rem; font-weight: 600; }
        .stock-price-change { font-size: 0.75rem; font-weight: 500; }
        
        /* Sentiment gauge */
        .gauge-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
        }
        
        .gauge {
            width: 160px;
            height: 80px;
            position: relative;
        }
        
        .gauge-bg {
            width: 100%;
            height: 100%;
        }
        
        .gauge-value {
            font-size: 1.75rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            margin-top: 0.5rem;
        }
        
        .gauge-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-top: 0.25rem;
        }
        
        /* Weather */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }
        
        .weather-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
        }
        
        .weather-city { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .weather-temp { font-size: 1.1rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: 0.2rem 0; }
        .weather-desc { font-size: 0.7rem; color: var(--text-muted); }
        
        /* Forex */
        .forex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        
        .forex-pair { color: var(--text-muted); }
        .forex-rate { font-weight: 600; }
        .forex-change { font-size: 0.75rem; font-weight: 500; }
        
        /* Commodities */
        .commodity-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .commodity-name { font-size: 0.8rem; font-weight: 500; }
        .commodity-price { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 0.9rem; }
        
        /* News */
        .news-item {
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .news-item:last-child { border-bottom: none; }
        
        .news-title {
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--text);
            text-decoration: none;
            display: block;
            transition: color 0.2s;
        }
        
        .news-title:hover { color: var(--cyan); }
        
        .news-meta {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 0.2rem;
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* Treasury */
        .yield-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .yield-maturity { font-size: 0.8rem; color: var(--text-muted); }
        .yield-rate { font-size: 0.9rem; font-weight: 600; }
        
        /* Loading */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes skeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        @media (max-width: 768px) {
            .dashboard { padding: 0.75rem; }
            .index-grid { grid-template-columns: repeat(2, 1fr); }
            .header { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    
    <header class="header">
        <div class="header-brand">
            <div class="header-logo">🌐</div>
            <div>
                <h1>WORLD MONITOR</h1>
                <span class="model-badge">GPT 5.5</span>
            </div>
        </div>
        <div class="header-status">
            <span class="status-dot"></span>
            <span id="feedStatus">LIVE FEEDS ACTIVE</span>
        </div>
        <div class="header-time mono" id="utcClock">--:--:-- UTC</div>
        <div class="header-actions">
            <button class="btn" onclick="refreshAll()">⟳ Refresh</button>
        </div>
    </header>
    
    <!-- World Clocks -->
    <div class="clocks-bar" id="clocksBar"></div>
    
    <!-- Ticker -->
    <div class="ticker-wrap">
        <div class="ticker" id="ticker"></div>
    </div>
    
    <!-- Dashboard -->
    <div class="dashboard">
        <div class="grid">
            
            <!-- Market Indices -->
            <div class="col-12">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--green)"></span> Global Indices</div>
                    </div>
                    <div class="panel-body">
                        <div class="index-grid" id="indicesGrid"></div>
                    </div>
                </div>
            </div>
            
            <!-- Stocks -->
            <div class="col-4">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--indigo)"></span> Equities</div>
                    </div>
                    <div class="panel-body" id="stocksPanel"></div>
                </div>
            </div>
            
            <!-- Commodities -->
            <div class="col-4">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--amber)"></span> Commodities</div>
                    </div>
                    <div class="panel-body" id="commoditiesPanel"></div>
                </div>
            </div>
            
            <!-- Forex -->
            <div class="col-4">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--cyan)"></span> Forex</div>
                    </div>
                    <div class="panel-body" id="forexPanel"></div>
                </div>
            </div>
            
            <!-- Market Sentiment -->
            <div class="col-3">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--amber)"></span> Sentiment</div>
                    </div>
                    <div class="panel-body">
                        <div class="gauge-wrap">
                            <div class="gauge">
                                <svg viewBox="0 0 160 80" class="gauge-bg">
                                    <defs>
                                        <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                            <stop offset="0%" stop-color="#ef4444"/>
                                            <stop offset="50%" stop-color="#f59e0b"/>
                                            <stop offset="100%" stop-color="#22c55e"/>
                                        </linearGradient>
                                    </defs>
                                    <path d="M 10 80 A 70 70 0 0 1 150 80" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round"/>
                                    <circle id="gaugeNeedle" cx="10" cy="80" r="6" fill="#e2e8f0"/>
                                </svg>
                            </div>
                            <div class="gauge-value" id="sentimentValue">--</div>
                            <div class="gauge-label" id="sentimentLabel">Calculating...</div>
                        </div>
                        <div id="sentimentDetails" style="font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem;"></div>
                    </div>
                </div>
            </div>
            
            <!-- Treasury Yields -->
            <div class="col-3">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--green)"></span> Treasury Yields</div>
                    </div>
                    <div class="panel-body" id="treasuryPanel"></div>
                </div>
            </div>
            
            <!-- Crypto -->
            <div class="col-3">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:#f59e0b"></span> Crypto</div>
                    </div>
                    <div class="panel-body" id="cryptoPanel"></div>
                </div>
            </div>
            
            <!-- Weather -->
            <div class="col-3">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--cyan)"></span> Weather</div>
                    </div>
                    <div class="panel-body">
                        <div class="weather-grid" id="weatherGrid"></div>
                    </div>
                </div>
            </div>
            
            <!-- Intel Feed -->
            <div class="col-6">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--cyan)"></span> Tech Intelligence</div>
                    </div>
                    <div class="panel-body" id="newsPanel"></div>
                </div>
            </div>
            
            <!-- Market Heatmap mini-chart -->
            <div class="col-6">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><span class="dot" style="background:var(--indigo)"></span> S&amp;P 500 Intraday</div>
                    </div>
                    <div class="panel-body" style="height: 280px;">
                        <canvas id="spxChart"></canvas>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // ========== CONFIG ==========
        const CITIES = [

        const STOCKS = [

            { symbol: 'AMD', name: 'AMD' },

        const COMMODITIES = [

            { symbol: 'BZ=F', name: 'Brent Oil' },

        const TREASURIES = [

            { symbol: '^TNX', name: '10Y Note', maturity: '10Y' },
            { symbol: '^TYX', name: '30Y Bond', maturity: '30Y' },
        ];

        const CRYPTO = [
            { id: 'bitcoin', symbol: 'BTC' },
            { id: 'ethereum', symbol: 'ETH' },
            { id: 'solana', symbol: 'SOL' },
        ];

        const WEATHER_CITIES = [
            { name: 'NYC', lat: 40.71, lon: -74.01 },
            { name: 'London', lat: 51.51, lon: -0.13 },
            { name: 'Tokyo', lat: 35.68, lon: 139.69 },
            { name: 'Singapore', lat: 1.35, lon: 103.82 },
        ];

        const FOREX_PAIRS = ['EURUSD', 'GBPUSD', 'USDJPY', 'USDCNY', 'AUDUSD', 'USDCAD'];

        let spxChart = null;
        let allData = { indices: {}, stocks: {}, commodities: {}, treasuries: {}, crypto: {}, forex: {} };

        // ========== CLOCKS ==========
        function updateClocks() {
            const now = new Date();
            document.getElementById('utcClock').textContent = now.toUTCString().split(' ')[4] + ' UTC';
            
            const bar = document.getElementById('clocksBar');
            bar.innerHTML = CITIES.map(city => {
                const time = new Date(now.toLocaleString('en-US', { timeZone: city.tz }));
                const hours = String(time.getHours()).padStart(2, '0');
                const mins = String(time.getMinutes()).padStart(2, '0');
                const hm = parseFloat(`${hours}.${mins}`);
                const [openH, openM] = city.open.split(':').map(Number);
                const [closeH, closeM] = city.close.split(':').map(Number);
                const openVal = openH + openM / 60;
                const closeVal = closeH + closeM / 60;
                
                let status = 'closed';
                let statusText = 'Closed';
                if (hm >= openVal && hm <= closeVal) {
                    status = 'open';
                    statusText = 'Market Open';
                } else if (hm > openVal - 0.5 && hm < openVal) {
                    status = 'pre';
                    statusText = 'Pre-Market';
                }
                
                return `
                    <div class="clock-item">
                        <div class="clock-city">${city.name}</div>
                        <div class="clock-time mono">${hours}:${mins}</div>
                        <div class="clock-status ${status}">${statusText}</div>
                    </div>
                `;
            }).join('');
        }

        // ========== YAHOO FINANCE ==========
        async function fetchYahoo(symbol) {
            try {
                const proxy = 'https://api.allorigins.win/raw?url=';
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=5m&range=1d`;
                const res = await fetch(proxy + encodeURIComponent(url));
                if (!res.ok) throw new Error('Fetch failed');
                const data = await res.json();
                if (!data.chart?.result?.[0]) throw new Error('No data');
                return data.chart.result[0];
            } catch (e) {
                return null;
            }
        }

        function parseYahoo(result) {
            if (!result) return null;
            const meta = result.meta;
            const prices = result.indicators?.quote?.[0]?.close?.filter(p => p !== null) || [];
            const prevClose = meta.previousClose || meta.chartPreviousClose || prices[0] || 0;
            const current = meta.regularMarketPrice || prices[prices.length - 1] || prevClose;
            const change = prevClose > 0 ? ((current - prevClose) / prevClose) * 100 : 0;
            return { price: current, change, prevClose, prices };
        }

        function generateSparkline(prices, isPositive) {
            if (!prices || prices.length < 2) return '';
            const min = Math.min(...prices);
            const max = Math.max(...prices);
            const range = max - min || 1;
            const w = 200, h = 40;
            const pts = prices.map((p, i) => {
                const x = (i / (prices.length - 1)) * w;
                const y = h - ((p - min) / range) * (h - 4) - 2;
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            });
            const color = isPositive ? 'var(--green)' : 'var(--red)';
            const area = `0,${h} ${pts.join(' ')} ${w},${h}`;
            return `
                <svg width="100%" height="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
                    <polygon points="${area}" fill="${isPositive ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'}"/>
                    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            `;
        }

        // ========== INDICES ==========
        async function loadIndices() {
            const grid = document.getElementById('indicesGrid');
            grid.innerHTML = INDICES.map(i => `
                <div class="index-card" id="idx-${i.symbol}">
                    <div class="index-name">${i.name}</div>
                    <div class="index-value skeleton" style="width:80px;height:20px;"></div>
                    <div class="spark-sm skeleton" style="width:100%;height:30px;"></div>
                </div>
            `).join('');

            for (const idx of INDICES) {
                const result = await fetchYahoo(idx.symbol);
                const data = parseYahoo(result);
                const el = document.getElementById(`idx-${idx.symbol}`);
                if (!data || !el) continue;
                
                allData.indices[idx.symbol] = data;
                const isPos = data.change >= 0;
                const isVix = idx.symbol === '^VIX';
                const displayChange = isVix ? `${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}` : `${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%`;
                
                el.innerHTML = `
                    <div class="index-name">${idx.name}</div>
                    <div class="index-value">${data.price.toLocaleString(undefined, {maximumFractionDigits: 2})}</div>
                    <div class="index-change ${isPos ? 'positive' : 'negative'}">${displayChange}</div>
                    <div class="spark-sm">${generateSparkline(data.prices, isPos)}</div>
                `;
            }
            updateTicker();
            updateSentiment();
        }

        // ========== STOCKS ==========
        async function loadStocks() {
            const panel = document.getElementById('stocksPanel');
            panel.innerHTML = STOCKS.map(s => `
                <div class="stock-row" id="stk-${s.symbol}">
                    <div class="stock-info">
                        <div class="stock-icon">${s.symbol[0]}</div>
                        <div>
                            <div class="stock-name">${s.name}</div>
                            <div class="stock-symbol">${s.symbol}</div>
                        </div>
                    </div>
                    <div class="stock-price">
                        <div class="stock-price-val skeleton" style="width:60px;height:16px;display:inline-block;"></div>
                    </div>
                </div>
            `).join('');

            for (const stock of STOCKS) {
                const result = await fetchYahoo(stock.symbol);
                const data = parseYahoo(result);
                const el = document.getElementById(`stk-${stock.symbol}`);
                if (!data || !el) continue;
                
                allData.stocks[stock.symbol] = data;
                const isPos = data.change >= 0;
                el.querySelector('.stock-price').innerHTML = `
                    <div class="stock-price-val">$${data.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="stock-price-change ${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${data.change.toFixed(2)}%</div>
                `;
            }
        }

        // ========== COMMODITIES ==========
        async function loadCommodities() {
            const panel = document.getElementById('commoditiesPanel');
            panel.innerHTML = COMMODITIES.map(c => `
                <div class="commodity-row" id="com-${c.symbol}">
                    <span class="commodity-name">${c.name}</span>
                    <span class="commodity-price skeleton" style="width:50px;height:16px;"></span>
                </div>
            `).join('');

            for (const com of COMMODITIES) {
                const result = await fetchYahoo(com.symbol);
                const data = parseYahoo(result);
                const el = document.getElementById(`com-${com.symbol}`);
                if (!data || !el) continue;
                
                allData.commodities[com.symbol] = data;
                const isPos = data.change >= 0;
                el.innerHTML = `
                    <span class="commodity-name">${com.name}</span>
                    <div style="text-align:right">
                        <div class="commodity-price">$${data.price.toFixed(2)}</div>
                        <div style="font-size:0.7rem;" class="${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${data.change.toFixed(2)}%</div>
                    </div>
                `;
            }
        }

        // ========== TREASURY ==========
        async function loadTreasuries() {
            const panel = document.getElementById('treasuryPanel');
            panel.innerHTML = TREASURIES.map(t => `
                <div class="yield-row" id="try-${t.symbol}">
                    <span class="yield-maturity">${t.maturity}</span>
                    <span class="yield-rate skeleton" style="width:40px;height:16px;"></span>
                </div>
            `).join('');

            for (const t of TREASURIES) {
                const result = await fetchYahoo(t.symbol);
                const data = parseYahoo(result);
                const el = document.getElementById(`try-${t.symbol}`);
                if (!data || !el) continue;
                
                allData.treasuries[t.symbol] = data;
                el.innerHTML = `
                    <span class="yield-maturity">${t.maturity}</span>
                    <span class="yield-rate">${data.price.toFixed(2)}%</span>
                `;
            }
        }

        // ========== CRYPTO ==========
        async function loadCrypto() {
            const panel = document.getElementById('cryptoPanel');
            try {
                const ids = CRYPTO.map(c => c.id).join(',');
                const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&sparkline=false`);
                const data = await res.json();
                
                panel.innerHTML = data.map(c => {
                    const change = c.price_change_percentage_24h || 0;
                    const isPos = change >= 0;
                    return `
                        <div class="stock-row">
                            <div class="stock-info">
                                <img src="${c.image}" style="width:24px;height:24px;border-radius:50%" alt="${c.symbol}">
                                <div>
                                    <div class="stock-name">${c.name}</div>
                                    <div class="stock-symbol">${c.symbol.toUpperCase()}</div>
                                </div>
                            </div>
                            <div class="stock-price">
                                <div class="stock-price-val">$${c.current_price.toLocaleString()}</div>
                                <div class="stock-price-change ${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${change.toFixed(2)}%</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                panel.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;text-align:center;padding:1rem;">Unable to load crypto data</div>';
            }
        }

        // ========== FOREX ==========
        async function loadForex() {
            const panel = document.getElementById('forexPanel');
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await res.json();
                const rates = data.rates;
                
                const pairs = [
                    { pair: 'EUR/USD', rate: rates.EUR },
                    { pair: 'GBP/USD', rate: rates.GBP },
                    { pair: 'USD/JPY', rate: rates.JPY },
                    { pair: 'USD/CNY', rate: rates.CNY },
                    { pair: 'AUD/USD', rate: rates.AUD },
                    { pair: 'USD/CAD', rate: 1 / rates.CAD },
                ];
                
                panel.innerHTML = pairs.map(f => `
                    <div class="forex-row">
                        <span class="forex-pair">${f.pair}</span>
                        <span class="forex-rate">${f.rate.toFixed(f.rate < 0.1 ? 4 : f.rate < 10 ? 4 : 2)}</span>
                    </div>
                `).join('');
            } catch (e) {
                panel.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;text-align:center;padding:1rem;">Unable to load forex data</div>';
            }
        }

        // ========== WEATHER ==========
        async function loadWeather() {
            const grid = document.getElementById('weatherGrid');
            grid.innerHTML = WEATHER_CITIES.map(w => `
                <div class="weather-item" id="w-${w.name}">
                    <div class="weather-city">${w.name}</div>
                    <div class="skeleton" style="width:40px;height:18px;margin:0.3rem auto;"></div>
                    <div class="weather-desc skeleton" style="width:50px;height:12px;margin:0 auto;"></div>
                </div>
            `).join('');

            for (const city of WEATHER_CITIES) {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`);
                    const data = await res.json();
                    const cw = data.current_weather;
                    const temp = cw.temperature;
                    const codes = { 0: 'Clear', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast', 45: 'Fog', 51: 'Drizzle', 61: 'Rain', 71: 'Snow', 95: 'Thunderstorm' };
                    const desc = codes[cw.weathercode] || 'Unknown';
                    
                    const el = document.getElementById(`w-${city.name}`);
                    if (el) el.innerHTML = `
                        <div class="weather-city">${city.name}</div>
                        <div class="weather-temp">${Math.round(temp)}°C</div>
                        <div class="weather-desc">${desc}</div>
                    `;
                } catch (e) {}
            }
        }

        // ========== NEWS ==========
        async function loadNews() {
            const panel = document.getElementById('newsPanel');
            try {
                const res = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
                const ids = await res.json();
                const topIds = ids.slice(0, 8);
                
                const stories = await Promise.all(topIds.map(async id => {
                    const r = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`);
                    return r.json();
                }));
                
                panel.innerHTML = stories.filter(s => s).map(s => `
                    <div class="news-item">
                        <a href="${s.url || `https://news.ycombinator.com/item?id=${s.id}`}" target="_blank" class="news-title">${s.title}</a>
                        <div class="news-meta">${s.score} points · ${s.descendants || 0} comments · ${new Date(s.time * 1000).toLocaleDateString()}</div>
                    </div>
                `).join('');
            } catch (e) {
                panel.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;text-align:center;padding:1rem;">Unable to load intel feed</div>';
            }
        }

        // ========== S&P CHART ==========
        async function loadSPXChart() {
            try {
                const proxy = 'https://api.allorigins.win/raw?url=';
                const url = 'https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?interval=15m&range=5d';
                const res = await fetch(proxy + encodeURIComponent(url));
                const data = await res.json();
                const result = data.chart.result[0];
                const timestamps = result.timestamp.map(t => t * 1000);
                const prices = result.indicators.quote[0].close;
                const validData = timestamps.map((t, i) => prices[i] !== null ? { x: t, y: prices[i] } : null).filter(p => p);
                
                const ctx = document.getElementById('spxChart').getContext('2d');
                const isUp = validData[validData.length - 1].y >= validData[0].y;
                
                if (spxChart) spxChart.destroy();
                
                spxChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            data: validData,
                            borderColor: isUp ? 'var(--green)' : 'var(--red)',
                            backgroundColor: (ctx) => {
                                const grad = ctx.chart.ctx.createLinearGradient(0, 0, 0, 250);
                                grad.addColorStop(0, isUp ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)');
                                grad.addColorStop(1, 'rgba(0,0,0,0)');
                                return grad;
                            },
                            fill: true,
                            borderWidth: 1.5,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { intersect: false, mode: 'index' },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: '#0a0f1a',
                                titleColor: '#64748b',
                                bodyColor: '#e2e8f0',
                                borderColor: 'rgba(255,255,255,0.1)',
                                borderWidth: 1,
                                padding: 10,
                                displayColors: false,
                                callbacks: {
                                    title: (items) => new Date(items[0].parsed.x).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                                    label: (item) => item.parsed.y.toLocaleString(undefined, { maximumFractionDigits: 2 })
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: { unit: 'day' },
                                grid: { color: 'rgba(255,255,255,0.02)' },
                                ticks: { color: '#334155', font: { size: 10 } }
                            },
                            y: {
                                grid: { color: 'rgba(255,255,255,0.02)' },
                                ticks: { color: '#334155', font: { size: 10 } }
                            }
                        }
                    }
                });
            } catch (e) {
                console.error('SPX chart failed:', e);
            }
        }

        // ========== SENTIMENT ==========
        function updateSentiment() {
            // Calculate a simple sentiment score from indices and VIX
            let score = 50;
            
            const spx = allData.indices['^GSPC'];
            const vix = allData.indices['^VIX'];
            const ndx = allData.indices['^IXIC'];
            
            if (spx) score += spx.change * 1.5;
            if (ndx) score += ndx.change * 1;
            if (vix) score -= (vix.price - 20) * 1.5;
            
            score = Math.max(0, Math.min(100, score));
            
            const labels = ['Extreme Fear', 'Fear', 'Neutral', 'Greed', 'Extreme Greed'];
            const labelIndex = Math.min(4, Math.floor(score / 20));
            const label = labels[labelIndex];
            
            document.getElementById('sentimentValue').textContent = Math.round(score);
            document.getElementById('sentimentLabel').textContent = label;
            document.getElementById('sentimentLabel').style.color = score > 60 ? 'var(--green)' : score < 40 ? 'var(--red)' : 'var(--amber)';
            
            // Move needle
            const needle = document.getElementById('gaugeNeedle');
            if (needle) {
                const angle = (score / 100) * 180;
                const rad = (angle * Math.PI) / 180;
                const cx = 80 + 70 * Math.cos(Math.PI - rad);
                const cy = 80 - 70 * Math.sin(rad);
                needle.setAttribute('cx', cx);
                needle.setAttribute('cy', cy);
            }
            
            // Details
            let details = [];
            if (spx) details.push(`S&P 500: ${spx.change >= 0 ? '+' : ''}${spx.change.toFixed(2)}%`);
            if (vix) details.push(`VIX: ${vix.price.toFixed(2)}`);
            document.getElementById('sentimentDetails').innerHTML = details.join(' · ');
        }

        // ========== TICKER ==========
        function updateTicker() {
            const items = Object.entries(allData.indices).map(([sym, data]) => {
                const name = INDICES.find(i => i.symbol === sym)?.name || sym;
                const isPos = data.change >= 0;
                return `
                    <span class="ticker-item">
                        <span class="symbol">${name}</span>
                        <span class="price">${data.price.toLocaleString(undefined, {maximumFractionDigits: 2})}</span>
                        <span class="change ${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${data.change.toFixed(2)}%</span>
                    </span>
                `;
            }).join('');
            
            // Duplicate for seamless loop
            document.getElementById('ticker').innerHTML = items + items;
        }

        // ========== REFRESH ==========
        async function refreshAll() {
            document.getElementById('feedStatus').textContent = 'UPDATING...';
            await Promise.all([
                loadIndices(),
                loadStocks(),
                loadCommodities(),
                loadTreasuries(),
                loadCrypto(),
                loadForex(),
                loadWeather(),
                loadNews(),
                loadSPXChart(),
            ]);
            document.getElementById('feedStatus').textContent = 'LIVE FEEDS ACTIVE';
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            updateClocks();
            setInterval(updateClocks, 1000);
            refreshAll();
            setInterval(refreshAll, 120000);
        });
    </script>
