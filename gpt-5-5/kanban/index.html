<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northstar Board - GPT 5.5</title>
<style>
  :root {
    --paper: #fbfaf6;
    --ink: #171717;
    --muted: #6f6b63;
    --quiet: #a39d91;
    --line: #ded8cc;
    --panel: #ffffff;
    --panel-2: #f3efe6;
    --charcoal: #202124;
    --blue: #1769e0;
    --aqua: #1d9a8a;
    --amber: #bc7416;
    --rose: #c94764;
    --violet: #7157d9;
    --green: #358a4b;
    --shadow: 0 16px 40px rgba(40, 36, 28, 0.12);
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  html, body { min-height: 100%; }

  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      linear-gradient(rgba(23, 23, 23, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px),
      var(--paper);
    background-size: 28px 28px;
  }

  button, input, select, textarea { font: inherit; }

  button {
    border: 0;
    cursor: pointer;
  }

  .workspace {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 76px minmax(0, 1fr) 348px;
  }

  .rail {
    background: var(--charcoal);
    color: #f7f2e8;
    padding: 18px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .mark {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    background: #f1c45c;
    color: #1c1c1c;
    font-weight: 900;
    letter-spacing: -0.08em;
  }

  .rail-button {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    color: #f7f2e8;
    background: rgba(255,255,255,0.08);
    font-weight: 800;
    transition: transform .16s ease, background .16s ease;
  }

  .rail-button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.16); }
  .rail-button.active { background: #f7f2e8; color: var(--charcoal); }

  .model-flag {
    margin-top: auto;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    letter-spacing: .16em;
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    color: #f1c45c;
  }

  .main {
    min-width: 0;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .topline {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto;
    gap: 18px;
    align-items: start;
  }

  .eyebrow {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  h1 {
    margin: 4px 0 0;
    font-size: clamp(28px, 4vw, 46px);
    line-height: .95;
    letter-spacing: -0.055em;
  }

  .controls {
    display: grid;
    grid-template-columns: minmax(180px, 280px) 142px 142px auto;
    gap: 8px;
    justify-content: end;
    align-items: center;
  }

  .field {
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.76);
    color: var(--ink);
    border-radius: var(--radius);
    padding: 10px 11px;
    min-height: 42px;
    min-width: 0;
    outline: none;
  }

  .field:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(23,105,224,.14);
  }

  .primary {
    min-height: 42px;
    padding: 0 15px;
    border-radius: var(--radius);
    background: var(--ink);
    color: white;
    font-weight: 800;
  }

  .secondary {
    min-height: 38px;
    padding: 0 12px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: white;
    color: var(--ink);
    font-weight: 750;
  }

  .ghost {
    background: transparent;
    color: var(--muted);
    font-weight: 800;
  }

  .metric-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(140px, 1fr));
    gap: 10px;
  }

  .metric {
    background: rgba(255,255,255,0.78);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 13px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .metric span {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .metric strong {
    font-size: 26px;
    letter-spacing: -0.05em;
  }

  .board-shell {
    min-height: 560px;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(5, minmax(244px, 1fr));
    gap: 12px;
    min-width: 1240px;
    align-items: stretch;
  }

  .lane {
    background: rgba(255,255,255,0.62);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    min-height: 560px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .lane[data-over="true"] {
    outline: 3px solid rgba(23,105,224,.18);
    border-color: var(--blue);
  }

  .lane-head {
    padding: 13px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    background: var(--panel-2);
  }

  .lane-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  .pin {
    width: 9px;
    height: 24px;
    border-radius: 99px;
    background: var(--blue);
  }

  .lane:nth-child(2) .pin { background: var(--amber); }
  .lane:nth-child(3) .pin { background: var(--violet); }
  .lane:nth-child(4) .pin { background: var(--aqua); }
  .lane:nth-child(5) .pin { background: var(--green); }

  .lane-count {
    min-width: 26px;
    height: 26px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    background: white;
    border: 1px solid var(--line);
    font-size: 12px;
    font-weight: 900;
  }

  .lane-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .task {
    background: var(--panel);
    border: 1px solid #d7d0c3;
    border-left: 5px solid var(--blue);
    border-radius: var(--radius);
    padding: 11px;
    box-shadow: 0 1px 0 rgba(0,0,0,.04);
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }

  .task:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .task[aria-selected="true"] {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(23,23,23,.1), var(--shadow);
  }

  .task[data-priority="Critical"] { border-left-color: var(--rose); }
  .task[data-priority="High"] { border-left-color: var(--amber); }
  .task[data-priority="Medium"] { border-left-color: var(--blue); }
  .task[data-priority="Low"] { border-left-color: var(--green); }
  .task.dragging { opacity: .5; transform: rotate(-1deg); }

  .task-top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: start;
  }

  .task h3 {
    margin: 0;
    font-size: 15px;
    line-height: 1.25;
    letter-spacing: -0.02em;
  }

  .task p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 11px;
  }

  .pill {
    border: 1px solid var(--line);
    background: #f9f6ee;
    color: var(--muted);
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 11px;
    font-weight: 850;
  }

  .date-pill[data-late="true"] { color: #ad263f; background: #fff0f2; border-color: #f1bdc8; }

  .task-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
  }

  .mini-actions {
    display: flex;
    gap: 4px;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: white;
    font-weight: 900;
    color: var(--ink);
  }

  .icon-btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }

  .empty {
    border: 1px dashed #cabfac;
    border-radius: var(--radius);
    min-height: 92px;
    display: grid;
    place-items: center;
    color: var(--quiet);
    font-size: 12px;
    font-weight: 850;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .inspector {
    background: #fdfbf5;
    border-left: 1px solid var(--line);
    padding: 22px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .inspector h2 {
    margin: 0;
    font-size: 23px;
    letter-spacing: -0.05em;
  }

  .inspector small {
    color: var(--muted);
    font-weight: 750;
  }

  .form {
    margin-top: 18px;
    display: grid;
    gap: 12px;
  }

  label {
    display: grid;
    gap: 6px;
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  textarea.field {
    resize: vertical;
    min-height: 92px;
    line-height: 1.4;
  }

  .row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 10px;
  }

  .form-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding-top: 4px;
  }

  .danger {
    background: #fff1f3;
    border: 1px solid #eeb6c1;
    color: #a92840;
  }

  .activity {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }

  .activity h3 {
    margin: 0 0 10px;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .log {
    display: grid;
    gap: 8px;
  }

  .log-item {
    font-size: 12px;
    line-height: 1.35;
    color: var(--muted);
    border-left: 3px solid var(--line);
    padding-left: 8px;
  }

  @media (max-width: 1120px) {
    .workspace { grid-template-columns: 64px 1fr; }
    .inspector {
      position: static;
      height: auto;
      grid-column: 1 / -1;
      border-left: 0;
      border-top: 1px solid var(--line);
    }
  }

  @media (max-width: 760px) {
    .workspace { display: block; }
    .rail {
      height: auto;
      position: static;
      flex-direction: row;
      justify-content: space-between;
    }
    .model-flag {
      writing-mode: initial;
      transform: none;
      margin: 0;
    }
    .main { padding: 16px; }
    .topline, .controls, .metric-strip { grid-template-columns: 1fr; }
    .controls { justify-content: stretch; }
    .board { min-width: 1120px; }
  }
</style>
</head>
<body>
<div class="workspace">
  <aside class="rail" aria-label="Board tools">
    <div class="mark">N</div>
    <button class="rail-button active" title="Board" type="button">B</button>
    <button class="rail-button" id="focusToday" title="Due soon" type="button">D</button>
    <button class="rail-button" id="focusBlocked" title="Blocked" type="button">!</button>
    <button class="rail-button" id="clearFilters" title="Clear filters" type="button">*</button>
    <div class="model-flag">GPT 5.5</div>
  </aside>

  <main class="main">
    <section class="topline">
      <div>
        <div class="eyebrow">Northstar workspace</div>
        <h1>Project board</h1>
      </div>
      <div class="controls">
        <input class="field" id="search" type="search" placeholder="Search tasks">
        <select class="field" id="priorityFilter" aria-label="Filter by priority">
          <option value="all">All priorities</option>
          <option>Critical</option>
          <option>High</option>
          <option>Medium</option>
          <option>Low</option>
        </select>
        <select class="field" id="ownerFilter" aria-label="Filter by owner">
          <option value="all">All owners</option>
        </select>
        <button class="primary" id="newTask" type="button">New task</button>
      </div>
    </section>

    <section class="metric-strip" aria-label="Board metrics">
      <div class="metric"><span>Total</span><strong id="metricTotal">0</strong></div>
      <div class="metric"><span>In flight</span><strong id="metricActive">0</strong></div>
      <div class="metric"><span>Blocked</span><strong id="metricBlocked">0</strong></div>
      <div class="metric"><span>Done</span><strong id="metricDone">0%</strong></div>
    </section>

    <section class="board-shell" aria-label="Kanban lanes">
      <div class="board" id="board"></div>
    </section>
  </main>

  <aside class="inspector" aria-label="Task editor">
    <div>
      <h2 id="editorTitle">Create task</h2>
      <small id="editorHint">Saved automatically to this browser.</small>
    </div>
    <form class="form" id="taskForm">
      <label>Title
        <input class="field" id="title" required maxlength="90">
      </label>
      <label>Notes
        <textarea class="field" id="notes" maxlength="320"></textarea>
      </label>
      <div class="row">
        <label>Column
          <select class="field" id="status"></select>
        </label>
        <label>Priority
          <select class="field" id="priority">
            <option>Critical</option>
            <option>High</option>
            <option selected>Medium</option>
            <option>Low</option>
          </select>
        </label>
      </div>
      <div class="row">
        <label>Owner
          <input class="field" id="owner" list="ownerHints" maxlength="28">
        </label>
        <label>Due
          <input class="field" id="due" type="date">
        </label>
      </div>
      <label>Tags
        <input class="field" id="tags" placeholder="design, api">
      </label>
      <div class="form-actions">
        <button class="primary" type="submit" id="saveTask">Save task</button>
        <button class="secondary" type="button" id="duplicateTask">Duplicate</button>
        <button class="secondary" type="button" id="resetForm">Reset</button>
        <button class="secondary danger" type="button" id="deleteTask">Delete</button>
      </div>
    </form>
    <datalist id="ownerHints"></datalist>
    <section class="activity">
      <h3>Recent moves</h3>
      <div class="log" id="activityLog"></div>
    </section>
  </aside>
</div>

<script>
(() => {
  const STORAGE_KEY = "gpt55.northstar.kanban.v1";
  const lanes = [
    { id: "backlog", name: "Backlog" },
    { id: "ready", name: "Ready" },
    { id: "doing", name: "Doing" },
    { id: "review", name: "Review" },
    { id: "done", name: "Done" }
  ];

  const seedTasks = [
    { title: "Map billing edge cases", notes: "Document failed payment states before QA planning.", status: "backlog", priority: "High", owner: "Mira", due: offsetDate(2), tags: ["billing", "qa"] },
    { title: "Prototype compact timeline", notes: "Validate the dense layout with two real project samples.", status: "ready", priority: "Medium", owner: "Ari", due: offsetDate(5), tags: ["ux"] },
    { title: "Unblock search indexing", notes: "Re-run fixture imports and confirm stale rows are cleared.", status: "doing", priority: "Critical", owner: "Dev", due: offsetDate(-1), tags: ["blocked", "infra"] },
    { title: "Review onboarding copy", notes: "Tighten empty state language and final CTA labels.", status: "review", priority: "Low", owner: "Lena", due: offsetDate(4), tags: ["content"] },
    { title: "Ship keyboard audit", notes: "Focus order and visible states confirmed on major flows.", status: "done", priority: "Medium", owner: "Noor", due: offsetDate(-3), tags: ["a11y"] }
  ].map(makeTask);

  const state = loadState();
  let selectedId = state.selectedId || null;
  let dragId = null;

  const el = {
    board: document.querySelector("#board"),
    form: document.querySelector("#taskForm"),
    editorTitle: document.querySelector("#editorTitle"),
    editorHint: document.querySelector("#editorHint"),
    title: document.querySelector("#title"),
    notes: document.querySelector("#notes"),
    status: document.querySelector("#status"),
    priority: document.querySelector("#priority"),
    owner: document.querySelector("#owner"),
    due: document.querySelector("#due"),
    tags: document.querySelector("#tags"),
    search: document.querySelector("#search"),
    priorityFilter: document.querySelector("#priorityFilter"),
    ownerFilter: document.querySelector("#ownerFilter"),
    ownerHints: document.querySelector("#ownerHints"),
    duplicate: document.querySelector("#duplicateTask"),
    reset: document.querySelector("#resetForm"),
    delete: document.querySelector("#deleteTask"),
    newTask: document.querySelector("#newTask"),
    metricTotal: document.querySelector("#metricTotal"),
    metricActive: document.querySelector("#metricActive"),
    metricBlocked: document.querySelector("#metricBlocked"),
    metricDone: document.querySelector("#metricDone"),
    log: document.querySelector("#activityLog")
  };

  lanes.forEach(lane => {
    const option = document.createElement("option");
    option.value = lane.id;
    option.textContent = lane.name;
    el.status.append(option);
  });

  render();
  if (selectedId && state.tasks.some(task => task.id === selectedId)) {
    loadEditor(selectedId);
  } else {
    clearEditor();
  }

  el.form.addEventListener("submit", event => {
    event.preventDefault();
    const payload = readForm();
    if (!payload.title.trim()) return;

    if (selectedId) {
      const task = findTask(selectedId);
      if (task) {
        Object.assign(task, payload, { updatedAt: Date.now() });
        addLog("Edited " + task.title);
      }
    } else {
      const task = makeTask(payload);
      state.tasks.unshift(task);
      selectedId = task.id;
      addLog("Created " + task.title);
    }

    save();
    render();
    loadEditor(selectedId);
  });

  el.newTask.addEventListener("click", clearEditor);
  el.reset.addEventListener("click", clearEditor);
  el.duplicate.addEventListener("click", () => {
    const task = selectedId ? findTask(selectedId) : null;
    if (!task) return;
    const copy = makeTask({ ...task, title: task.title + " copy", status: task.status });
    state.tasks.unshift(copy);
    selectedId = copy.id;
    addLog("Duplicated " + task.title);
    save();
    render();
    loadEditor(selectedId);
  });
  el.delete.addEventListener("click", () => {
    if (!selectedId) return;
    const task = findTask(selectedId);
    state.tasks = state.tasks.filter(item => item.id !== selectedId);
    addLog("Deleted " + (task ? task.title : "task"));
    selectedId = null;
    save();
    render();
    clearEditor();
  });

  [el.search, el.priorityFilter, el.ownerFilter].forEach(input => input.addEventListener("input", render));
  document.querySelector("#clearFilters").addEventListener("click", () => {
    el.search.value = "";
    el.priorityFilter.value = "all";
    el.ownerFilter.value = "all";
    render();
  });
  document.querySelector("#focusToday").addEventListener("click", () => {
    const today = new Date();
    const week = new Date();
    week.setDate(today.getDate() + 7);
    el.search.value = "";
    el.priorityFilter.value = "all";
    el.ownerFilter.value = "all";
    state.focusDue = !state.focusDue;
    state.focusBlocked = false;
    save();
    render();
  });
  document.querySelector("#focusBlocked").addEventListener("click", () => {
    el.search.value = "blocked";
    el.priorityFilter.value = "all";
    el.ownerFilter.value = "all";
    state.focusBlocked = !state.focusBlocked;
    state.focusDue = false;
    save();
    render();
  });

  function render() {
    renderOwners();
    renderMetrics();
    renderLog();
    el.board.innerHTML = "";
    const filtered = getFilteredTasks();

    lanes.forEach(lane => {
      const laneEl = document.createElement("article");
      laneEl.className = "lane";
      laneEl.dataset.status = lane.id;
      laneEl.innerHTML = `
        <header class="lane-head">
          <div class="lane-title"><span class="pin"></span>${lane.name}</div>
          <div class="lane-count">${filtered.filter(task => task.status === lane.id).length}</div>
        </header>
        <div class="lane-body" data-lane-body="${lane.id}"></div>
      `;

      laneEl.addEventListener("dragover", event => {
        event.preventDefault();
        laneEl.dataset.over = "true";
      });
      laneEl.addEventListener("dragleave", () => laneEl.dataset.over = "false");
      laneEl.addEventListener("drop", event => {
        event.preventDefault();
        laneEl.dataset.over = "false";
        if (dragId) moveTask(dragId, lane.id);
      });

      const body = laneEl.querySelector(".lane-body");
      const cards = filtered.filter(task => task.status === lane.id);
      if (!cards.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No matching tasks";
        body.append(empty);
      } else {
        cards.forEach(task => body.append(taskCard(task)));
      }
      el.board.append(laneEl);
    });
  }

  function taskCard(task) {
    const card = document.createElement("article");
    card.className = "task";
    card.draggable = true;
    card.dataset.id = task.id;
    card.dataset.priority = task.priority;
    card.setAttribute("aria-selected", String(task.id === selectedId));

    const dueLate = task.due && new Date(task.due + "T23:59:59") < new Date() && task.status !== "done";
    const laneIndex = lanes.findIndex(lane => lane.id === task.status);
    const tags = [...task.tags, task.owner ? "@" + task.owner : "", task.priority, task.due || ""].filter(Boolean);

    card.innerHTML = `
      <div class="task-top">
        <h3>${escapeHtml(task.title)}</h3>
        <span class="pill">${escapeHtml(shortLane(task.status))}</span>
      </div>
      <p>${escapeHtml(task.notes || "No notes yet.")}</p>
      <div class="tag-row">
        ${tags.map(tag => `<span class="pill ${tag === task.due ? "date-pill" : ""}" data-late="${tag === task.due && dueLate}">${escapeHtml(tag)}</span>`).join("")}
      </div>
      <div class="task-actions">
        <button class="ghost" type="button" data-edit="${task.id}">Edit</button>
        <div class="mini-actions">
          <button class="icon-btn" type="button" data-shift="-1" ${laneIndex === 0 ? "disabled" : ""} title="Move left">&lt;</button>
          <button class="icon-btn" type="button" data-shift="1" ${laneIndex === lanes.length - 1 ? "disabled" : ""} title="Move right">&gt;</button>
        </div>
      </div>
    `;

    card.addEventListener("click", event => {
      if (event.target.closest("button")) return;
      loadEditor(task.id);
    });
    card.querySelector("[data-edit]").addEventListener("click", () => loadEditor(task.id));
    card.querySelectorAll("[data-shift]").forEach(button => {
      button.addEventListener("click", () => {
        const next = lanes[laneIndex + Number(button.dataset.shift)];
        if (next) moveTask(task.id, next.id);
      });
    });
    card.addEventListener("dragstart", () => {
      dragId = task.id;
      card.classList.add("dragging");
    });
    card.addEventListener("dragend", () => {
      dragId = null;
      card.classList.remove("dragging");
    });

    return card;
  }

  function getFilteredTasks() {
    const query = el.search.value.trim().toLowerCase();
    const priority = el.priorityFilter.value;
    const owner = el.ownerFilter.value;
    const now = new Date();
    const soon = new Date();
    soon.setDate(now.getDate() + 7);

    return state.tasks.filter(task => {
      const haystack = [task.title, task.notes, task.owner, task.priority, task.status, task.tags.join(" ")].join(" ").toLowerCase();
      const matchesQuery = !query || haystack.includes(query);
      const matchesPriority = priority === "all" || task.priority === priority;
      const matchesOwner = owner === "all" || task.owner === owner;
      const dueDate = task.due ? new Date(task.due + "T12:00:00") : null;
      const matchesDue = !state.focusDue || (dueDate && dueDate <= soon && task.status !== "done");
      const matchesBlocked = !state.focusBlocked || haystack.includes("blocked");
      return matchesQuery && matchesPriority && matchesOwner && matchesDue && matchesBlocked;
    }).sort((a, b) => priorityRank(a.priority) - priorityRank(b.priority) || (a.due || "9999").localeCompare(b.due || "9999"));
  }

  function renderOwners() {
    const owners = [...new Set(state.tasks.map(task => task.owner).filter(Boolean))].sort();
    const current = el.ownerFilter.value;
    el.ownerFilter.innerHTML = '<option value="all">All owners</option>' + owners.map(owner => `<option>${escapeHtml(owner)}</option>`).join("");
    el.ownerFilter.value = owners.includes(current) ? current : "all";
    el.ownerHints.innerHTML = owners.map(owner => `<option value="${escapeHtml(owner)}"></option>`).join("");
  }

  function renderMetrics() {
    const total = state.tasks.length;
    const done = state.tasks.filter(task => task.status === "done").length;
    const active = state.tasks.filter(task => ["doing", "review"].includes(task.status)).length;
    const blocked = state.tasks.filter(task => (task.tags.join(" ") + " " + task.notes).toLowerCase().includes("blocked")).length;
    el.metricTotal.textContent = total;
    el.metricActive.textContent = active;
    el.metricBlocked.textContent = blocked;
    el.metricDone.textContent = total ? Math.round(done / total * 100) + "%" : "0%";
  }

  function renderLog() {
    const entries = state.log.slice(0, 6);
    el.log.innerHTML = entries.length ? entries.map(item => `<div class="log-item">${escapeHtml(item)}</div>`).join("") : '<div class="log-item">No recent changes.</div>';
  }

  function loadEditor(id) {
    const task = findTask(id);
    if (!task) return;
    selectedId = id;
    el.editorTitle.textContent = "Edit task";
    el.editorHint.textContent = "Selected: " + task.title;
    el.title.value = task.title;
    el.notes.value = task.notes || "";
    el.status.value = task.status;
    el.priority.value = task.priority;
    el.owner.value = task.owner || "";
    el.due.value = task.due || "";
    el.tags.value = task.tags.join(", ");
    el.delete.disabled = false;
    el.duplicate.disabled = false;
    save();
    render();
  }

  function clearEditor() {
    selectedId = null;
    el.editorTitle.textContent = "Create task";
    el.editorHint.textContent = "Saved automatically to this browser.";
    el.form.reset();
    el.status.value = "backlog";
    el.priority.value = "Medium";
    el.delete.disabled = true;
    el.duplicate.disabled = true;
    save();
    render();
    el.title.focus();
  }

  function readForm() {
    return {
      title: el.title.value.trim(),
      notes: el.notes.value.trim(),
      status: el.status.value,
      priority: el.priority.value,
      owner: el.owner.value.trim(),
      due: el.due.value,
      tags: el.tags.value.split(",").map(tag => tag.trim()).filter(Boolean)
    };
  }

  function moveTask(id, status) {
    const task = findTask(id);
    if (!task || task.status === status) return;
    const from = shortLane(task.status);
    task.status = status;
    task.updatedAt = Date.now();
    selectedId = id;
    addLog("Moved " + task.title + " from " + from + " to " + shortLane(status));
    save();
    render();
    loadEditor(id);
  }

  function findTask(id) {
    return state.tasks.find(task => task.id === id);
  }

  function makeTask(data) {
    return {
      id: data.id || "task-" + Math.random().toString(36).slice(2, 10),
      title: data.title || "Untitled task",
      notes: data.notes || "",
      status: data.status || "backlog",
      priority: data.priority || "Medium",
      owner: data.owner || "",
      due: data.due || "",
      tags: Array.isArray(data.tags) ? data.tags : [],
      createdAt: data.createdAt || Date.now(),
      updatedAt: Date.now()
    };
  }

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && Array.isArray(saved.tasks)) {
        return { tasks: saved.tasks.map(makeTask), log: saved.log || [], selectedId: saved.selectedId || null, focusDue: false, focusBlocked: false };
      }
    } catch (error) {
      console.warn("Kanban storage reset", error);
    }
    return { tasks: seedTasks, log: ["Loaded GPT 5.5 starter board"], selectedId: null, focusDue: false, focusBlocked: false };
  }

  function save() {
    state.selectedId = selectedId;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function addLog(message) {
    const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    state.log.unshift(time + " - " + message);
    state.log = state.log.slice(0, 20);
  }

  function shortLane(status) {
    const lane = lanes.find(item => item.id === status);
    return lane ? lane.name : status;
  }

  function priorityRank(priority) {
    return { Critical: 0, High: 1, Medium: 2, Low: 3 }[priority] ?? 4;
  }

  function offsetDate(days) {
    const date = new Date();
    date.setDate(date.getDate() + days);
    return date.toISOString().slice(0, 10);
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }
})();
</script>
</body>
</html>
