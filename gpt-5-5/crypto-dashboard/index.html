<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Desk Crypto - GPT 5.5</title>
<style>
  :root {
    --bg: #edf1f4;
    --ink: #101318;
    --muted: #5d6975;
    --line: #ccd5de;
    --panel: #ffffff;
    --panel-2: #f6f8fa;
    --night: #111820;
    --cyan: #00a6b2;
    --blue: #3168e0;
    --green: #168351;
    --red: #bf2e42;
    --amber: #ad7411;
    --shadow: 0 18px 46px rgba(22, 31, 42, 0.13);
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  html, body { min-height: 100%; }

  body {
    margin: 0;
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
  }

  button, input, select { font: inherit; }
  button { cursor: pointer; border: 0; }

  .terminal {
    min-height: 100vh;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 392px;
  }

  .mast {
    background: var(--night);
    color: #f7fbff;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: minmax(260px, 1fr) auto;
    gap: 16px;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 5;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 13px;
    min-width: 0;
  }

  .logo {
    width: 46px;
    height: 46px;
    border-radius: var(--radius);
    background:
      linear-gradient(135deg, transparent 44%, rgba(255,255,255,.85) 45% 55%, transparent 56%),
      linear-gradient(90deg, var(--cyan), #8be4db);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.2);
  }

  h1 {
    margin: 0;
    font-size: clamp(24px, 3vw, 38px);
    line-height: .95;
    letter-spacing: -0.055em;
  }

  .brand span {
    display: inline-block;
    margin-top: 6px;
    color: #95a8ba;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .16em;
    text-transform: uppercase;
  }

  .status-line {
    display: flex;
    justify-content: end;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .badge {
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 999px;
    padding: 6px 10px;
    color: #d7e5f2;
    background: rgba(255,255,255,.06);
    font-size: 12px;
    font-weight: 850;
  }

  .badge.live::before {
    content: "";
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 7px;
    background: #35d489;
    box-shadow: 0 0 12px #35d489;
  }

  .work {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .deck {
    padding: 18px 22px 22px;
    display: grid;
    gap: 14px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(140px, 1fr));
    gap: 10px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 13px;
  }

  .stat b {
    display: block;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .stat strong {
    display: block;
    margin-top: 6px;
    font-size: 24px;
    letter-spacing: -0.055em;
  }

  .toolbar {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) 160px 160px 130px auto;
    gap: 8px;
    align-items: center;
  }

  .field {
    min-height: 42px;
    padding: 10px 11px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    outline: none;
  }

  .field:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,166,178,.16);
  }

  .btn {
    min-height: 42px;
    padding: 0 14px;
    border-radius: var(--radius);
    background: var(--night);
    color: white;
    font-weight: 850;
  }

  .toggle {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
  }

  .market {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .market-head, .coin-row {
    display: grid;
    grid-template-columns: 70px minmax(210px, 1.1fr) repeat(5, minmax(112px, .8fr));
    gap: 0;
    align-items: center;
  }

  .market-head {
    background: #e3e9ef;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .1em;
    font-weight: 900;
    border-bottom: 1px solid var(--line);
  }

  .market-head button {
    min-height: 40px;
    padding: 0 12px;
    text-align: right;
    color: inherit;
    background: transparent;
    font-weight: 900;
  }

  .market-head button:first-child,
  .market-head button:nth-child(2) { text-align: left; }

  .coin-row {
    width: 100%;
    background: white;
    border-bottom: 1px solid var(--line);
    color: var(--ink);
    text-align: left;
    transition: background .16s ease;
  }

  .coin-row:hover,
  .coin-row[aria-selected="true"] {
    background: #f3fbfc;
  }

  .coin-row[aria-selected="true"] {
    box-shadow: inset 4px 0 0 var(--cyan);
  }

  .cell {
    padding: 13px 12px;
    min-width: 0;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .cell.left { text-align: left; }

  .coin {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .coin img, .coin-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex: none;
    background: linear-gradient(135deg, #dfe8ef, #fff);
    border: 1px solid var(--line);
  }

  .coin-icon {
    display: grid;
    place-items: center;
    font-weight: 900;
    color: var(--blue);
  }

  .coin-name {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  .coin-symbol {
    display: block;
    margin-top: 2px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 850;
    text-transform: uppercase;
  }

  .rank {
    color: var(--muted);
    font-weight: 850;
  }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .muted { color: var(--muted); }

  .spark {
    width: 118px;
    height: 32px;
    display: inline-block;
  }

  .message {
    padding: 36px;
    text-align: center;
    color: var(--muted);
    font-weight: 800;
  }

  .detail {
    min-width: 0;
    background: #fbfcfd;
    border-left: 1px solid var(--line);
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
  }

  .detail-head {
    padding: 22px;
    background: var(--night);
    color: white;
  }

  .detail-label {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    color: #9db0c1;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: .14em;
  }

  .detail-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }

  .detail-title img,
  .detail-title .coin-icon {
    width: 48px;
    height: 48px;
  }

  .detail-title h2 {
    margin: 0;
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.055em;
  }

  .detail-title span {
    color: #9db0c1;
    font-weight: 850;
    text-transform: uppercase;
  }

  .price {
    margin-top: 20px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .price strong {
    font-size: 34px;
    letter-spacing: -0.06em;
  }

  .price span {
    font-weight: 900;
  }

  .detail-body {
    padding: 18px;
    overflow-y: auto;
    display: grid;
    gap: 14px;
  }

  .chart-card,
  .info-grid,
  .note {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }

  .chart-card {
    padding: 12px;
  }

  #bigChart {
    display: block;
    width: 100%;
    height: 220px;
  }

  .range-tabs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }

  .range-tabs button {
    flex: 1;
    min-height: 34px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: #f6f8fa;
    font-weight: 850;
    color: var(--muted);
  }

  .range-tabs button.active {
    background: var(--night);
    color: white;
    border-color: var(--night);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  .info {
    padding: 12px;
    border-bottom: 1px solid var(--line);
  }

  .info:nth-child(odd) { border-right: 1px solid var(--line); }
  .info:nth-last-child(-n+2) { border-bottom: 0; }

  .info b {
    display: block;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .info span {
    display: block;
    margin-top: 5px;
    font-size: 16px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .note {
    padding: 13px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  @media (max-width: 1180px) {
    .terminal { grid-template-columns: 1fr; }
    .detail {
      position: static;
      height: auto;
      border-left: 0;
      border-top: 1px solid var(--line);
    }
  }

  @media (max-width: 900px) {
    .mast, .toolbar, .stats { grid-template-columns: 1fr; }
    .status-line { justify-content: start; }
    .market { overflow-x: auto; }
    .market-head, .coin-row { min-width: 970px; }
  }
</style>
</head>
<body>
<div class="terminal">
  <main class="work">
    <header class="mast">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Signal Desk Crypto</h1>
          <span>GPT 5.5 intelligence dashboard</span>
        </div>
      </div>
      <div class="status-line">
        <span class="badge live" id="sourceBadge">Connecting</span>
        <span class="badge" id="updatedBadge">No update yet</span>
      </div>
    </header>

    <section class="deck">
      <div class="stats" aria-label="Market summary">
        <div class="stat"><b>Market cap</b><strong id="statCap">$0</strong></div>
        <div class="stat"><b>24h volume</b><strong id="statVol">$0</strong></div>
        <div class="stat"><b>BTC dominance</b><strong id="statDom">0%</strong></div>
        <div class="stat"><b>Avg 24h move</b><strong id="statMove">0%</strong></div>
      </div>

      <div class="toolbar">
        <input class="field" id="search" type="search" placeholder="Search coin or symbol">
        <select class="field" id="marketFilter" aria-label="Market filter">
          <option value="all">All markets</option>
          <option value="mega">Mega cap</option>
          <option value="large">Large cap</option>
          <option value="movers">24h movers</option>
          <option value="down">Pullbacks</option>
        </select>
        <select class="field" id="sortBy" aria-label="Sort coins">
          <option value="market_cap_rank">Rank</option>
          <option value="name">Name</option>
          <option value="price_change_percentage_24h">24h change</option>
          <option value="current_price">Price</option>
          <option value="total_volume">Volume</option>
          <option value="market_cap">Market cap</option>
        </select>
        <select class="field" id="currency" aria-label="Currency">
          <option value="usd">USD</option>
          <option value="eur">EUR</option>
          <option value="gbp">GBP</option>
          <option value="jpy">JPY</option>
        </select>
        <button class="btn" id="refresh" type="button">Refresh</button>
      </div>

      <section class="market" aria-label="Cryptocurrency market table">
        <div class="market-head">
          <button type="button" data-sort="market_cap_rank">Rank</button>
          <button type="button" data-sort="name">Asset</button>
          <button type="button" data-sort="current_price">Price</button>
          <button type="button" data-sort="price_change_percentage_24h">24h</button>
          <button type="button" data-sort="market_cap">Market cap</button>
          <button type="button" data-sort="total_volume">Volume</button>
          <button type="button" data-sort="sparkline">Signal</button>
        </div>
        <div id="coinRows"></div>
      </section>
    </section>
  </main>

  <aside class="detail" aria-label="Selected coin detail">
    <header class="detail-head">
      <div class="detail-label">
        <span>Selected asset</span>
        <span id="rankLabel">Rank --</span>
      </div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="price">
        <strong id="detailPrice">$0</strong>
        <span id="detailChange">0%</span>
      </div>
    </header>
    <div class="detail-body">
      <div class="chart-card">
        <canvas id="bigChart" width="700" height="360"></canvas>
        <div class="range-tabs">
          <button type="button" class="active" data-range="sparkline">7D</button>
          <button type="button" data-range="day">24H</button>
          <button type="button" data-range="shape">Shape</button>
        </div>
      </div>
      <div class="info-grid" id="detailStats"></div>
      <div class="note" id="detailNote"></div>
    </div>
  </aside>
</div>

<script>
(() => {
  const API = "https://api.coingecko.com/api/v3";
  const fallbackCoins = [
    coin("bitcoin", "Bitcoin", "btc", 1, 68420, 1.8, 1340000000000, 29800000000, [63520, 64220, 65600, 64880, 66700, 67640, 68420]),
    coin("ethereum", "Ethereum", "eth", 2, 3860, -0.7, 464000000000, 14200000000, [3740, 3810, 3920, 3895, 3840, 3915, 3860]),
    coin("solana", "Solana", "sol", 5, 168.4, 4.2, 77000000000, 4200000000, [144, 149, 152, 158, 155, 163, 168.4]),
    coin("ripple", "XRP", "xrp", 6, 0.62, -1.6, 34600000000, 1600000000, [0.66, 0.64, 0.63, 0.61, 0.62, 0.63, 0.62]),
    coin("dogecoin", "Dogecoin", "doge", 8, 0.171, 6.1, 24700000000, 2100000000, [0.145, 0.151, 0.158, 0.149, 0.162, 0.166, 0.171]),
    coin("chainlink", "Chainlink", "link", 14, 18.72, 2.4, 11000000000, 690000000, [16.8, 17.3, 17.1, 17.9, 18.1, 18.5, 18.72]),
    coin("near", "NEAR Protocol", "near", 20, 7.34, -3.4, 7900000000, 560000000, [8.1, 7.9, 7.7, 7.42, 7.2, 7.51, 7.34]),
    coin("render-token", "Render", "rndr", 31, 9.62, 8.9, 3700000000, 260000000, [7.1, 7.4, 7.8, 8.3, 8.8, 9.1, 9.62])
  ];

  const els = {
    rows: document.querySelector("#coinRows"),
    source: document.querySelector("#sourceBadge"),
    updated: document.querySelector("#updatedBadge"),
    search: document.querySelector("#search"),
    filter: document.querySelector("#marketFilter"),
    sort: document.querySelector("#sortBy"),
    currency: document.querySelector("#currency"),
    refresh: document.querySelector("#refresh"),
    cap: document.querySelector("#statCap"),
    vol: document.querySelector("#statVol"),
    dom: document.querySelector("#statDom"),
    move: document.querySelector("#statMove"),
    title: document.querySelector("#detailTitle"),
    price: document.querySelector("#detailPrice"),
    change: document.querySelector("#detailChange"),
    rank: document.querySelector("#rankLabel"),
    stats: document.querySelector("#detailStats"),
    note: document.querySelector("#detailNote"),
    chart: document.querySelector("#bigChart")
  };

  const state = {
    coins: [],
    selected: null,
    sortDir: 1,
    range: "sparkline",
    currency: "usd"
  };

  attachEvents();
  loadMarkets();

  function attachEvents() {
    [els.search, els.filter, els.sort].forEach(control => control.addEventListener("input", render));
    els.currency.addEventListener("input", () => {
      state.currency = els.currency.value;
      loadMarkets();
    });
    els.refresh.addEventListener("click", loadMarkets);
    document.querySelectorAll("[data-sort]").forEach(button => {
      button.addEventListener("click", () => {
        if (els.sort.value === button.dataset.sort) state.sortDir *= -1;
        els.sort.value = button.dataset.sort === "sparkline" ? "market_cap_rank" : button.dataset.sort;
        render();
      });
    });
    document.querySelectorAll("[data-range]").forEach(button => {
      button.addEventListener("click", () => {
        state.range = button.dataset.range;
        document.querySelectorAll("[data-range]").forEach(item => item.classList.toggle("active", item === button));
        drawDetail();
      });
    });
  }

  async function loadMarkets() {
    els.refresh.textContent = "Loading";
    els.source.textContent = "Connecting";
    try {
      const marketsUrl = `${API}/coins/markets?vs_currency=${state.currency}&order=market_cap_desc&per_page=40&page=1&sparkline=true&price_change_percentage=1h,24h,7d`;
      const globalUrl = `${API}/global`;
      const [marketsRes, globalRes] = await Promise.all([fetch(marketsUrl), fetch(globalUrl)]);
      if (!marketsRes.ok) throw new Error("CoinGecko market request failed");
      state.coins = (await marketsRes.json()).map(normalizeCoin);
      if (globalRes.ok) {
        const global = await globalRes.json();
        renderGlobal(global.data);
      } else {
        renderGlobal(null);
      }
      els.source.textContent = "CoinGecko live";
    } catch (error) {
      console.warn(error);
      state.coins = fallbackCoins;
      renderGlobal(null);
      els.source.textContent = "Fallback data";
    } finally {
      els.refresh.textContent = "Refresh";
      els.updated.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      state.selected = state.selected || state.coins[0]?.id;
      render();
    }
  }

  function render() {
    const coins = filteredCoins();
    els.rows.innerHTML = "";
    if (!coins.length) {
      els.rows.innerHTML = '<div class="message">No assets match the current filters.</div>';
      return;
    }
    if (!coins.some(item => item.id === state.selected)) state.selected = coins[0].id;

    coins.forEach(item => {
      const row = document.createElement("button");
      row.type = "button";
      row.className = "coin-row";
      row.setAttribute("aria-selected", String(item.id === state.selected));
      row.innerHTML = `
        <span class="cell left rank">#${safe(item.market_cap_rank || "--")}</span>
        <span class="cell left">
          <span class="coin">${coinImage(item)}<span><span class="coin-name">${safe(item.name)}</span><span class="coin-symbol">${safe(item.symbol)}</span></span></span>
        </span>
        <span class="cell">${money(item.current_price)}</span>
        <span class="cell ${item.change24 >= 0 ? "pos" : "neg"}">${pct(item.change24)}</span>
        <span class="cell">${compact(item.market_cap)}</span>
        <span class="cell">${compact(item.total_volume)}</span>
        <span class="cell"><canvas class="spark" width="160" height="42" data-spark="${item.id}"></canvas></span>
      `;
      row.addEventListener("click", () => {
        state.selected = item.id;
        render();
      });
      els.rows.append(row);
    });

    requestAnimationFrame(() => {
      coins.forEach(item => drawSpark(document.querySelector(`[data-spark="${cssEscape(item.id)}"]`), item.sparkline, item.change24));
      drawDetail();
      renderSummary(coins);
    });
  }

  function filteredCoins() {
    const query = els.search.value.trim().toLowerCase();
    const filter = els.filter.value;
    const sortKey = els.sort.value;
    return state.coins.filter(item => {
      const matchesQuery = !query || item.name.toLowerCase().includes(query) || item.symbol.toLowerCase().includes(query);
      const matchesFilter =
        filter === "all" ||
        (filter === "mega" && item.market_cap >= 200000000000) ||
        (filter === "large" && item.market_cap >= 10000000000 && item.market_cap < 200000000000) ||
        (filter === "movers" && Math.abs(item.change24) >= 1) ||
        (filter === "down" && item.change24 < 0);
      return matchesQuery && matchesFilter;
    }).sort((a, b) => {
      const av = a[sortKey] ?? 0;
      const bv = b[sortKey] ?? 0;
      if (typeof av === "string") return av.localeCompare(bv) * state.sortDir;
      if (sortKey === "market_cap_rank") return (av - bv) * state.sortDir;
      return (bv - av) * state.sortDir;
    });
  }

  function renderSummary(coins) {
    const totalCap = sum(coins, "market_cap");
    const totalVol = sum(coins, "total_volume");
    const btc = state.coins.find(item => item.symbol.toLowerCase() === "btc");
    const avgMove = coins.reduce((acc, item) => acc + item.change24, 0) / Math.max(coins.length, 1);
    els.cap.textContent = compact(totalCap);
    els.vol.textContent = compact(totalVol);
    els.dom.textContent = btc && totalCap ? Math.round((btc.market_cap / totalCap) * 1000) / 10 + "%" : "--";
    els.move.textContent = pct(avgMove);
    els.move.className = avgMove >= 0 ? "pos" : "neg";
  }

  function renderGlobal(data) {
    if (!data) return;
    const marketCap = data.total_market_cap?.[state.currency];
    const volume = data.total_volume?.[state.currency];
    const dominance = data.market_cap_percentage?.btc;
    if (marketCap) els.cap.textContent = compact(marketCap);
    if (volume) els.vol.textContent = compact(volume);
    if (dominance) els.dom.textContent = Math.round(dominance * 10) / 10 + "%";
  }

  function drawDetail() {
    const item = state.coins.find(coin => coin.id === state.selected) || state.coins[0];
    if (!item) return;

    els.title.innerHTML = `${coinImage(item)}<div><h2>${safe(item.name)}</h2><span>${safe(item.symbol)}</span></div>`;
    els.price.textContent = money(item.current_price);
    els.change.textContent = pct(item.change24);
    els.change.className = item.change24 >= 0 ? "pos" : "neg";
    els.rank.textContent = "Rank #" + (item.market_cap_rank || "--");
    els.stats.innerHTML = [
      ["Market cap", compact(item.market_cap)],
      ["24h volume", compact(item.total_volume)],
      ["24h high", money(item.high_24h)],
      ["24h low", money(item.low_24h)],
      ["Supply", compact(item.circulating_supply)],
      ["7d move", pct(item.change7d)]
    ].map(([label, value]) => `<div class="info"><b>${label}</b><span>${value}</span></div>`).join("");

    const trend = item.change24 >= 3 ? "momentum expansion" : item.change24 <= -3 ? "risk-off pullback" : "range-bound tape";
    const volumeTone = item.total_volume > item.market_cap * 0.08 ? "heavy turnover" : "moderate turnover";
    els.note.textContent = `${item.name} shows ${trend} with ${volumeTone}. Use the table filters to compare relative strength, liquidity, and drawdowns across the current market set.`;

    const values = chartValues(item);
    drawSpark(els.chart, values, item.change24, true);
  }

  function chartValues(item) {
    const base = item.sparkline.length ? item.sparkline : [item.current_price];
    if (state.range === "sparkline") return base;
    if (state.range === "day") return base.slice(Math.max(0, base.length - Math.ceil(base.length / 3)));
    const min = Math.min(...base);
    const max = Math.max(...base);
    return base.map((value, index) => value + Math.sin(index / 2) * (max - min) * 0.04);
  }

  function drawSpark(canvas, values, change, big = false) {
    if (!canvas || !values || values.length < 2) return;
    const ctx = canvas.getContext("2d");
    const ratio = window.devicePixelRatio || 1;
    const box = canvas.getBoundingClientRect();
    const width = Math.max(1, Math.round((box.width || canvas.width) * ratio));
    const height = Math.max(1, Math.round((box.height || canvas.height) * ratio));
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    ctx.clearRect(0, 0, width, height);
    const pad = big ? 22 * ratio : 4 * ratio;
    const min = Math.min(...values);
    const max = Math.max(...values);
    const span = max - min || 1;
    const xStep = (width - pad * 2) / (values.length - 1);
    const y = value => height - pad - ((value - min) / span) * (height - pad * 2);

    if (big) {
      ctx.strokeStyle = "#d8e0e8";
      ctx.lineWidth = ratio;
      for (let i = 0; i < 4; i++) {
        const gy = pad + i * (height - pad * 2) / 3;
        ctx.beginPath();
        ctx.moveTo(pad, gy);
        ctx.lineTo(width - pad, gy);
        ctx.stroke();
      }
    }

    ctx.beginPath();
    values.forEach((value, index) => {
      const x = pad + index * xStep;
      const yy = y(value);
      if (index === 0) ctx.moveTo(x, yy);
      else ctx.lineTo(x, yy);
    });
    ctx.strokeStyle = change >= 0 ? "#168351" : "#bf2e42";
    ctx.lineWidth = big ? 3 * ratio : 2 * ratio;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.stroke();

    if (big) {
      const gradient = ctx.createLinearGradient(0, pad, 0, height - pad);
      gradient.addColorStop(0, change >= 0 ? "rgba(22,131,81,.22)" : "rgba(191,46,66,.22)");
      gradient.addColorStop(1, "rgba(255,255,255,0)");
      ctx.lineTo(width - pad, height - pad);
      ctx.lineTo(pad, height - pad);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();
    }
  }

  function normalizeCoin(item) {
    return {
      id: item.id,
      name: item.name,
      symbol: item.symbol,
      image: item.image,
      market_cap_rank: item.market_cap_rank,
      current_price: Number(item.current_price || 0),
      market_cap: Number(item.market_cap || 0),
      total_volume: Number(item.total_volume || 0),
      high_24h: Number(item.high_24h || 0),
      low_24h: Number(item.low_24h || 0),
      circulating_supply: Number(item.circulating_supply || 0),
      change24: Number(item.price_change_percentage_24h || 0),
      change7d: Number(item.price_change_percentage_7d_in_currency || 0),
      sparkline: item.sparkline_in_7d?.price?.filter(Number.isFinite) || []
    };
  }

  function coin(id, name, symbol, rank, price, change24, cap, volume, sparkline) {
    return {
      id,
      name,
      symbol,
      image: "",
      market_cap_rank: rank,
      current_price: price,
      high_24h: Math.max(...sparkline),
      low_24h: Math.min(...sparkline),
      market_cap: cap,
      total_volume: volume,
      circulating_supply: cap / price,
      change24,
      change7d: ((sparkline[sparkline.length - 1] - sparkline[0]) / sparkline[0]) * 100,
      sparkline
    };
  }

  function coinImage(item) {
    if (item.image) return `<img src="${safe(item.image)}" alt="">`;
    return `<span class="coin-icon">${safe(item.symbol.slice(0, 1).toUpperCase())}</span>`;
  }

  function money(value) {
    const currency = state.currency.toUpperCase();
    return new Intl.NumberFormat("en-US", {
      style: "currency",
      currency,
      maximumFractionDigits: value < 1 ? 5 : value < 100 ? 2 : 0
    }).format(value || 0);
  }

  function compact(value) {
    return new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: state.currency.toUpperCase(),
      notation: "compact",
      maximumFractionDigits: 2
    }).format(value || 0);
  }

  function pct(value) {
    const num = Number(value || 0);
    return (num > 0 ? "+" : "") + num.toFixed(2) + "%";
  }

  function sum(items, key) {
    return items.reduce((total, item) => total + Number(item[key] || 0), 0);
  }

  function safe(value) {
    return String(value ?? "").replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[char]));
  }

  function cssEscape(value) {
    if (window.CSS && CSS.escape) return CSS.escape(value);
    return String(value).replace(/"/g, '\\"');
  }
})();
</script>
</body>
